<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机一题 | 面试题库</title>
<meta name="description" content="随机抽取面试题，AI分析答案匹配度，错题本功能">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg-dark: #0a0a0f;
  --bg-card: rgba(15, 15, 25, 0.8);
  --neon-cyan: #00f0ff;
  --neon-purple: #b000ff;
  --neon-green: #00ff88;
  --neon-pink: #ff0080;
  --neon-yellow: #f0ff00;
  --neon-orange: #ff8800;
  --text-primary: #e0e0ff;
  --text-secondary: #8888aa;
  --border-glow: rgba(0, 240, 255, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-grid {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-image:
    linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: 0;
}

.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--neon-cyan);
  border-radius: 50%;
  animation: float linear infinite;
  box-shadow: 0 0 6px var(--neon-cyan);
}

@keyframes float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.95);
  border-bottom: 1px solid var(--border-glow);
  backdrop-filter: blur(20px);
}

.navbar .container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5em;
  font-weight: 900;
  color: var(--neon-cyan);
  text-decoration: none;
  text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
  letter-spacing: 2px;
}

.logo span { color: var(--text-secondary); font-weight: 400; }

.nav-links {
  display: flex;
  gap: 30px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 0.85em;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.3s;
}

.nav-links a:hover {
  color: var(--neon-cyan);
  text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
}

.hero {
  position: relative;
  z-index: 2;
  padding: 60px 30px 40px;
  text-align: center;
  background: linear-gradient(180deg, rgba(0, 240, 255, 0.05) 0%, transparent 100%);
}

.hero h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5em;
  font-weight: 900;
  color: var(--neon-cyan);
  text-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
  margin-bottom: 15px;
}

.hero .subtitle {
  font-size: 1em;
  color: var(--text-secondary);
  margin-bottom: 30px;
}

/* Main container */
.main-container {
  position: relative;
  z-index: 2;
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 30px 60px;
}

/* Question card */
.question-card {
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 16px;
  padding: 30px;
  margin-bottom: 30px;
}

.question-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.question-meta {
  display: flex;
  gap: 10px;
  align-items: center;
}

.question-num {
  padding: 5px 15px;
  background: rgba(0, 240, 255, 0.1);
  border: 1px solid rgba(0, 240, 255, 0.3);
  border-radius: 6px;
  font-size: 0.85em;
  color: var(--neon-cyan);
}

.difficulty-tag {
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 0.8em;
  font-weight: 600;
}

.difficulty-tag.easy {
  background: rgba(0, 255, 136, 0.1);
  border: 1px solid rgba(0, 255, 136, 0.3);
  color: var(--neon-green);
}

.difficulty-tag.medium {
  background: rgba(255, 136, 0, 0.1);
  border: 1px solid rgba(255, 136, 0, 0.3);
  color: var(--neon-orange);
}

.difficulty-tag.hard {
  background: rgba(255, 0, 128, 0.1);
  border: 1px solid rgba(255, 0, 128, 0.3);
  color: var(--neon-pink);
}

.question-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.question-tag {
  padding: 3px 10px;
  background: rgba(176, 0, 255, 0.1);
  border: 1px solid rgba(176, 0, 255, 0.3);
  border-radius: 4px;
  font-size: 0.75em;
  color: var(--neon-purple);
}

.question-title {
  font-size: 1.3em;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.6;
  margin-bottom: 20px;
}

.question-actions {
  display: flex;
  gap: 10px;
}

.action-btn {
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--border-glow);
  border-radius: 8px;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85em;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.action-btn:hover {
  border-color: var(--neon-cyan);
  color: var(--neon-cyan);
  background: rgba(0, 240, 255, 0.05);
}

.action-btn.primary {
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
  border: none;
  color: white;
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
}

.action-btn.primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 30px rgba(0, 240, 255, 0.4);
}

/* Answer section */
.answer-section {
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 16px;
  padding: 30px;
  margin-bottom: 30px;
}

.answer-section h3 {
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-purple);
  margin-bottom: 20px;
  font-size: 1.1em;
}

.answer-input {
  width: 100%;
  min-height: 200px;
  padding: 20px;
  background: rgba(15, 15, 25, 0.9);
  border: 1px solid var(--border-glow);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95em;
  line-height: 1.8;
  resize: vertical;
  outline: none;
  transition: all 0.3s;
}

.answer-input:focus {
  border-color: var(--neon-cyan);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
}

.answer-input::placeholder {
  color: var(--text-secondary);
}

.submit-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 30px;
  background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
  border: none;
  border-radius: 8px;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
  margin-top: 15px;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 30px rgba(0, 255, 136, 0.4);
}

.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Score result */
.score-result {
  display: none;
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 16px;
  padding: 30px;
  margin-bottom: 30px;
}

.score-result.show {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.score-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.score-header h3 {
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-cyan);
  font-size: 1.1em;
}

.score-circle {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 2em;
  font-weight: 900;
  margin: 0 auto 20px;
}

.score-circle.high {
  background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 240, 255, 0.2));
  border: 3px solid var(--neon-green);
  color: var(--neon-green);
  text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
}

.score-circle.medium {
  background: linear-gradient(135deg, rgba(255, 136, 0, 0.2), rgba(255, 255, 0, 0.2));
  border: 3px solid var(--neon-orange);
  color: var(--neon-orange);
  text-shadow: 0 0 20px rgba(255, 136, 0, 0.5);
}

.score-circle.low {
  background: linear-gradient(135deg, rgba(255, 0, 128, 0.2), rgba(255, 0, 0, 0.2));
  border: 3px solid var(--neon-pink);
  color: var(--neon-pink);
  text-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
}

.score-feedback {
  color: var(--text-secondary);
  line-height: 1.8;
  margin-bottom: 20px;
}

.score-feedback p {
  margin-bottom: 8px;
}

.match-details {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 20px;
}

.match-details h4 {
  color: var(--neon-cyan);
  margin-bottom: 10px;
  font-size: 0.9em;
}

.match-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0, 240, 255, 0.1);
  font-size: 0.85em;
}

.match-item:last-child {
  border-bottom: none;
}

.match-label {
  color: var(--text-secondary);
}

.match-value {
  color: var(--neon-green);
}

.match-value.low {
  color: var(--neon-pink);
}

/* Standard answer */
.standard-answer {
  display: none;
  background: var(--bg-card);
  border: 1px solid rgba(255, 0, 128, 0.3);
  border-radius: 16px;
  padding: 30px;
  margin-bottom: 30px;
}

.standard-answer.show {
  display: block;
  animation: fadeIn 0.3s ease;
}

.standard-answer h3 {
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-pink);
  margin-bottom: 20px;
  font-size: 1.1em;
}

.standard-answer .answer-content {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 12px;
  padding: 25px;
  line-height: 1.8;
  color: var(--text-primary);
}

.standard-answer .answer-content p {
  margin-bottom: 12px;
}

.standard-answer .answer-content strong {
  color: var(--neon-cyan);
}

/* Wrong question book */
.wrong-book-section {
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 16px;
  padding: 30px;
  margin-bottom: 30px;
}

.wrong-book-section h3 {
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-orange);
  margin-bottom: 20px;
  font-size: 1.1em;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.wrong-book-section .count-badge {
  padding: 5px 15px;
  background: rgba(255, 136, 0, 0.1);
  border: 1px solid rgba(255, 136, 0, 0.3);
  border-radius: 20px;
  font-size: 0.8em;
  color: var(--neon-orange);
}

.wrong-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.wrong-item {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 10px;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all 0.3s;
  border: 1px solid transparent;
}

.wrong-item:hover {
  border-color: var(--neon-orange);
  background: rgba(255, 136, 0, 0.05);
}

.wrong-item .question-text {
  flex: 1;
  font-size: 0.9em;
  color: var(--text-primary);
  margin-right: 15px;
}

.wrong-item .fail-count {
  padding: 5px 12px;
  background: rgba(255, 0, 128, 0.1);
  border: 1px solid rgba(255, 0, 128, 0.3);
  border-radius: 6px;
  font-size: 0.8em;
  color: var(--neon-pink);
  white-space: nowrap;
}

.wrong-item .remove-btn {
  margin-left: 10px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 1.1em;
  padding: 5px;
  transition: color 0.3s;
}

.wrong-item .remove-btn:hover {
  color: var(--neon-pink);
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-secondary);
}

.empty-state .icon {
  font-size: 3em;
  margin-bottom: 15px;
}

/* Stats bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-bottom: 30px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}

.stat-card .stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8em;
  font-weight: 900;
  color: var(--neon-cyan);
  text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
}

.stat-card .stat-label {
  font-size: 0.8em;
  color: var(--text-secondary);
  margin-top: 5px;
}

/* Footer */
.footer {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 40px 30px;
  border-top: 1px solid var(--border-glow);
  color: var(--text-secondary);
  font-size: 0.85em;
}

.footer a {
  color: var(--neon-cyan);
  text-decoration: none;
}

/* Responsive */
@media (max-width: 768px) {
  .hero h1 { font-size: 1.8em; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .question-header { flex-direction: column; gap: 10px; }
  .nav-links { display: none; }
}

/* Cursor blink */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--neon-cyan);
  margin-left: 5px;
  animation: blink 1s infinite;
  vertical-align: text-bottom;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 10, 15, 0.9);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show {
  display: flex;
}

.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 16px;
  padding: 30px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.modal-header h3 {
  font-family: 'Orbitron', sans-serif;
  color: var(--neon-orange);
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.5em;
  cursor: pointer;
  transition: color 0.3s;
}

.modal-close:hover {
  color: var(--neon-pink);
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="particles" id="particles"></div>

<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">LY<span>.DEV</span></a>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/interview-questions/">面试题库</a></li>
      <li><a href="/random-question/" style="color:var(--neon-orange)">🎯 随机一题</a></li>
      <li><a href="/ai-mock-interview/">AI模拟面试</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <h1>RANDOM QUESTION<span class="cursor"></span></h1>
  <p class="subtitle">// 🎯 随机出题 · AI评分 · 错题本 · 查漏补缺</p>
</section>

<div class="main-container">
  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="totalAttempted">0</div>
      <div class="stat-label">已答题目</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="passCount">0</div>
      <div class="stat-label">通过数量</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="wrongCount">0</div>
      <div class="stat-label">错题数量</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="passRate">0%</div>
      <div class="stat-label">通过率</div>
    </div>
  </div>

  <!-- Question Card -->
  <div class="question-card" id="questionCard">
    <div class="question-header">
      <div class="question-meta">
        <span class="question-num" id="questionNum"># 题目 1</span>
        <span class="difficulty-tag" id="questionDiff">中等</span>
      </div>
      <div class="question-tags" id="questionTags"></div>
    </div>
    <div class="question-title" id="questionTitle">
      点击下方按钮开始随机出题...
    </div>
    <div class="question-actions">
      <button class="action-btn primary" onclick="getRandomQuestion()">
        🎲 随机一题
      </button>
      <button class="action-btn" onclick="showWrongBook()">
        📕 错题本
        <span id="wrongBadge" style="display:none;background:var(--neon-pink);color:white;padding:2px 8px;border-radius:10px;font-size:0.8em">0</span>
      </button>
    </div>
  </div>

  <!-- Answer Section -->
  <div class="answer-section" id="answerSection" style="display:none">
    <h3>✏️ 输入你的答案</h3>
    <textarea class="answer-input" id="answerInput" placeholder="请在此输入你的答案...&#10;&#10;提示：尽量详细地回答，包含关键概念、原理和实际应用场景。"></textarea>
    <button class="submit-btn" onclick="submitAnswer()" id="submitBtn">
      📝 提交答案
    </button>
  </div>

  <!-- Score Result -->
  <div class="score-result" id="scoreResult">
    <div class="score-header">
      <h3>📊 评分结果</h3>
    </div>
    <div class="score-circle" id="scoreCircle">0</div>
    <div class="score-feedback" id="scoreFeedback"></div>
    <div class="match-details" id="matchDetails">
      <h4>匹配度分析</h4>
      <div id="matchItems"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="action-btn primary" onclick="getRandomQuestion()">🎲 下一题</button>
      <button class="action-btn" onclick="showCurrentAnswer()">📖 查看标准答案</button>
    </div>
  </div>

  <!-- Standard Answer -->
  <div class="standard-answer" id="standardAnswer">
    <h3>📖 标准答案</h3>
    <div class="answer-content" id="standardContent"></div>
    <button class="action-btn primary" onclick="getRandomQuestion()" style="margin-top:15px">
      🎲 下一题
    </button>
  </div>

  <!-- Wrong Book Section -->
  <div class="wrong-book-section" id="wrongBookSection" style="display:none">
    <h3>
      📕 错题本
      <span class="count-badge" id="wrongBookCount">0 道</span>
    </h3>
    <div class="wrong-list" id="wrongList"></div>
  </div>
</div>

<!-- Wrong Book Modal -->
<div class="modal-overlay" id="wrongBookModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📕 错题本详情</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 李阳的技术博客 | <a href="/">eligible123.github.io</a></p>
  <p style="margin-top:8px; opacity:0.6">// 随机一题 · Powered by MiMo AI</p>
</footer>

<script>
// Create particles
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
    particle.style.animationDelay = Math.random() * 10 + 's';
    container.appendChild(particle);
  }
}

// Submit answer
function submitAnswer() {
  const userAnswer = document.getElementById('answerInput').value.trim();
  
  if (!userAnswer) {
    alert('请输入你的答案！');
    return;
  }
  
  if (!currentQuestion) {
    alert('请先获取一道题目！');
    return;
  }
  
  // Disable button
  document.getElementById('submitBtn').disabled = true;
  
  // Simulate AI analysis
  setTimeout(() => {
    const result = analyzeAnswer(userAnswer, currentQuestion.answer);
    
    // Update stats
    stats.attempted++;
    if (result.score >= 60) {
      stats.passed++;
      // Remove from wrong book if passed
      if (wrongBook[currentQuestion.id]) {
        delete wrongBook[currentQuestion.id];
      }
    } else {
      // Add to wrong book
      if (!wrongBook[currentQuestion.id]) {
        wrongBook[currentQuestion.id] = {
          question: currentQuestion.title,
          failCount: 0,
          lastAttempt: new Date().toISOString()
        };
      }
      wrongBook[currentQuestion.id].failCount++;
      wrongBook[currentQuestion.id].lastAttempt = new Date().toISOString();
    }
    
    updateStats();
    
    // Show result
    showScoreResult(result);
    
    // Re-enable button
    document.getElementById('submitBtn').disabled = false;
  }, 1500);
}

// Analyze answer (simulated AI analysis)
function analyzeAnswer(userAnswer, standardAnswer) {
  const userLength = userAnswer.length;
  const standardLength = standardAnswer.length;
  
  // Extract keywords from standard answer
  const keywords = standardAnswer.match(/[\u4e00-\u9fa5a-zA-Z]+/g) || [];
  const importantKeywords = keywords.filter(k => k.length >= 2);
  
  // Count matched keywords
  let matchedCount = 0;
  const matchedKeywords = [];
  const missedKeywords = [];
  
  importantKeywords.forEach(keyword => {
    if (userAnswer.includes(keyword)) {
      matchedCount++;
      matchedKeywords.push(keyword);
    } else {
      missedKeywords.push(keyword);
    }
  });
  
  // Calculate base score from keyword matching
  const keywordScore = Math.min(100, Math.round((matchedCount / Math.max(importantKeywords.length, 1)) * 100));
  
  // Length bonus
  let lengthBonus = 0;
  if (userLength > standardLength * 0.8) lengthBonus = 10;
  else if (userLength > standardLength * 0.5) lengthBonus = 5;
  else if (userLength < standardLength * 0.2) lengthBonus = -10;
  
  // Structure bonus
  let structureBonus = 0;
  if (userAnswer.includes('1.') || userAnswer.includes('①') || userAnswer.includes('•')) structureBonus += 5;
  if (userAnswer.includes('：') || userAnswer.includes(':')) structureBonus += 3;
  
  const finalScore = Math.max(0, Math.min(100, keywordScore + lengthBonus + structureBonus));
  
  return {
    score: finalScore,
    keywordScore,
    lengthBonus,
    structureBonus,
    matchedKeywords: [...new Set(matchedKeywords)].slice(0, 5),
    missedKeywords: [...new Set(missedKeywords)].slice(0, 5),
    feedback: generateFeedback(finalScore, matchedKeywords.length, importantKeywords.length)
  };
}

function generateFeedback(score, matched, total) {
  if (score >= 90) return '🎉 优秀！你的回答非常全面，涵盖了大部分关键点。';
  if (score >= 80) return '👍 良好！回答基本正确，继续加油！';
  if (score >= 60) return '✅ 及格！回答涵盖了主要概念，但有些细节可以补充。';
  if (score >= 40) return '⚠️ 不及格！你的回答缺少很多关键点，建议复习相关知识。';
  return '❌ 需要加强！建议仔细学习这道题的相关知识点。';
}

// Show score result
function showScoreResult(result) {
  const resultEl = document.getElementById('scoreResult');
  const circleEl = document.getElementById('scoreCircle');
  const feedbackEl = document.getElementById('scoreFeedback');
  const matchItemsEl = document.getElementById('matchItems');
  
  // Set score circle
  circleEl.textContent = result.score;
  circleEl.className = 'score-circle';
  if (result.score >= 80) circleEl.classList.add('high');
  else if (result.score >= 60) circleEl.classList.add('medium');
  else circleEl.classList.add('low');
  
  // Set feedback
  feedbackEl.innerHTML = `
    <p>${result.feedback}</p>
    <p>📊 关键词匹配：${result.matchedKeywords.length} / ${result.matchedKeywords.length + result.missedKeywords.length}</p>
  `;
  
  // Set match details
  let matchHTML = '';
  if (result.matchedKeywords.length > 0) {
    matchHTML += `<div class="match-item"><span class="match-label">✅ 匹配关键词</span><span class="match-value">${result.matchedKeywords.join('、')}</span></div>`;
  }
  if (result.missedKeywords.length > 0) {
    matchHTML += `<div class="match-item"><span class="match-label">❌ 遗漏关键词</span><span class="match-value low">${result.missedKeywords.join('、')}</span></div>`;
  }
  matchHTML += `<div class="match-item"><span class="match-label">📝 内容长度</span><span class="match-value">${result.lengthBonus >= 0 ? '+' : ''}${result.lengthBonus}分</span></div>`;
  matchHTML += `<div class="match-item"><span class="match-label">📋 结构化</span><span class="match-value">+${result.structureBonus}分</span></div>`;
  matchItemsEl.innerHTML = matchHTML;
  
  // Show result
  resultEl.classList.add('show');
  
  // Auto show standard answer if score < 60
  if (result.score < 60) {
    setTimeout(() => {
      showCurrentAnswer();
    }, 1000);
  }
  
  // Scroll to result
  resultEl.scrollIntoView({ behavior: 'smooth' });
}

// Show current answer
function showCurrentAnswer() {
  if (!currentQuestion) return;
  
  const answerEl = document.getElementById('standardAnswer');
  const contentEl = document.getElementById('standardContent');
  
  // Format answer with paragraphs
  const formattedAnswer = currentQuestion.answer
    .split('\n')
    .map(line => {
      if (line.trim() === '') return '';
      // Bold text
      line = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      // List items
      if (line.match(/^[0-9]+\./) || line.match(/^[-•]/)) {
        return `<p style="margin-left:20px">${line}</p>`;
      }
      return `<p>${line}</p>`;
    })
    .join('');
  
  contentEl.innerHTML = formattedAnswer;
  answerEl.classList.add('show');
  answerEl.scrollIntoView({ behavior: 'smooth' });
}
