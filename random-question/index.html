<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机一题 | 面试题库</title>
<meta name="description" content="随机抽取面试题，闪记卡模式，点击翻转查看答案">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#111827;--secondary:#374151;--bg:#F9FAFB;--card:#FFFFFF;--border:#E5E7EB;--text:#111827;--subtext:#6B7280;--accent:#10B981;--accent-light:#D1FAE5;--accent-dark:#059669;--green:#10B981;--green-bg:#D1FAE5;--orange:#F59E0B;--orange-bg:#FEF3C7;--red:#EF4444;--red-bg:#FEE2E2;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--gray-50);color:var(--gray-800);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
.navbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray-200)}
.navbar .container{max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;color:var(--gray-900);text-decoration:none}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{text-decoration:none;color:var(--gray-500);font-size:14px;font-weight:500;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--accent-dark)}
.hero{padding:100px 24px 40px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:-20px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(16,185,129,.05) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:-1}
.hero h1{font-size:36px;font-weight:800;color:var(--gray-900);letter-spacing:-1px;margin-bottom:8px}
.hero .subtitle{font-size:16px;color:var(--gray-500)}
.container{max-width:680px;margin:0 auto;padding:0 24px 80px;width:100%}

/* Flashcard */
.flashcard-wrap{perspective:1200px;margin-bottom:32px}
.flashcard{position:relative;width:100%;min-height:380px;cursor:pointer;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);padding:40px 36px;display:flex;flex-direction:column;background:#fff;border:1.5px solid var(--gray-200);box-shadow:var(--shadow)}
.flashcard-back{transform:rotateY(180deg);overflow-y:auto}
.flashcard-face .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-shrink:0}
.card-num{padding:4px 14px;background:var(--accent-light);color:var(--accent-dark);border-radius:8px;font-size:13px;font-weight:600}
.card-diff{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600}
.card-diff.easy{background:var(--green-bg);color:#16a34a}
.card-diff.medium{background:var(--orange-bg);color:#d97706}
.card-diff.hard{background:var(--red-bg);color:#dc2626}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.card-tag{padding:3px 10px;background:var(--gray-100);color:var(--gray-500);border-radius:6px;font-size:12px}
.flashcard-front .card-title{font-size:22px;font-weight:700;color:var(--gray-900);line-height:1.6;flex:1;display:flex;align-items:center;justify-content:center;text-align:center}
.flashcard-back .card-title{font-size:15px;line-height:1.9;color:var(--gray-700);flex:1}
.flashcard-front .card-hint{font-size:13px;color:var(--gray-400);text-align:center;margin-top:20px;flex-shrink:0}
.flashcard-back .card-label{font-size:14px;font-weight:600;color:var(--accent-dark);margin-bottom:16px;flex-shrink:0}

/* Controls */
.controls{display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:24px}
.nav-btn{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-btn:hover:not(:disabled){border-color:var(--accent-dark);color:var(--accent-dark);background:var(--accent-light)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.random-btn{padding:14px 32px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:8px}
.random-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(16,185,129,.25)}
.random-btn:active{transform:translateY(0)}
.counter{font-size:14px;color:var(--gray-400);text-align:center;margin-bottom:32px}

/* Category filter */
.cat-filter{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:32px}
.cat-btn{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);transition:all .2s;font-family:inherit}
.cat-btn:hover{border-color:var(--accent);color:var(--accent-dark)}
.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--accent-dark)}

.footer{margin-top:auto;border-top:1px solid var(--gray-200);padding:24px;text-align:center;color:var(--gray-400);font-size:13px}

@media(max-width:768px){
  .hero h1{font-size:28px}
  .flashcard-face{padding:28px 24px}
  .flashcard-front .card-title{font-size:18px}
  .flashcard{min-height:320px}
  .nav-links{display:none}
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">八股面试</a>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/interview-questions/">题库</a></li>
      <li><a href="/ai-mock-interview/">AI面试</a></li>
      <li><a href="/random-question/" class="active">随机一题</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <h1>随机一题</h1>
  <p class="subtitle">闪记卡模式 · 点击翻转查看答案 · 左右切换</p>
</section>

<div class="container">
  <div class="cat-filter" id="catFilter"></div>

  <div class="flashcard-wrap">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="flashcard-face flashcard-front">
        <div class="card-header">
          <span class="card-num" id="cardNum">#1</span>
          <span class="card-diff easy" id="cardDiff">简单</span>
        </div>
        <div class="card-title" id="cardQuestion">点击「随机一题」开始...</div>
        <div class="card-hint">👆 点击卡片翻转查看答案</div>
      </div>
      <div class="flashcard-face flashcard-back">
        <div class="card-header">
          <span class="card-num" id="cardNumBack">#1</span>
          <div class="card-tags" id="cardTagsBack"></div>
        </div>
        <div class="card-label">📖 参考答案</div>
        <div class="card-title" id="cardAnswer"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="nav-btn" id="prevBtn" onclick="event.stopPropagation();goCard(-1)" disabled>‹</button>
    <button class="random-btn" onclick="event.stopPropagation();randomCard()">🎲 随机一题</button>
    <button class="nav-btn" id="nextBtn" onclick="event.stopPropagation();goCard(1)" disabled>›</button>
  </div>

  <div class="counter" id="counter">点击「随机一题」开始练习</div>
</div>

<footer class="footer">
  <p>© 2026 张三的技术博客</p>
</footer>

<script>
// Load all questions from interview category data.js files
const CATEGORIES_DATA = [
  'AI大模型','Agent面试题','Docker','Dubbo','ElasticSearch','Git基础','Git概念','Git进阶',
  'Java','Java热门200道','Kafka','Kubernetes','Linux系统','MyBatis','MySQL','Netty','Nginx',
  'RabbitMQ','Redis','RocketMQ','Spring','SpringBoot','SpringCloud','SQL电商场景','SQL网站场景',
  'Zookeeper','后端场景','后端系统设计','大厂算法真题','操作系统','消息队列','计算机网络','设计模式',
  '华为OD','字节跳动面经','阿里巴巴面经','京东面经','美团面经','拼多多面经','腾讯面经','快手面经',
  '百度面经','小米面经','小红书面经','得物面经','网易面经','滴滴出行面经'
];

let allQuestions = [];
let filtered = [];
let history = [];
let historyIdx = -1;
let currentCat = 'all';
let loaded = false;

// Load questions from data.js files
async function loadAll() {
  const loadCat = async (cat) => {
    try {
      const resp = await fetch(`/interview-questions/${encodeURIComponent(cat)}/data.js`);
      if (!resp.ok) return [];
      const text = await resp.text();
      const match = text.match(/\[[\s\S]*\]/);
      if (!match) return [];
      const arr = JSON.parse(match[0]);
      return arr.map(q => ({...q, category: cat}));
    } catch { return []; }
  };

  // Load in batches to avoid overwhelming
  const batches = [];
  for (let i = 0; i < CATEGORIES_DATA.length; i += 8) {
    batches.push(CATEGORIES_DATA.slice(i, i + 8));
  }
  for (const batch of batches) {
    const results = await Promise.all(batch.map(loadCat));
    results.forEach(arr => allQuestions.push(...arr));
  }

  // Build category filter
  const cats = [...new Set(allQuestions.map(q => q.category))].sort();
  const filterEl = document.getElementById('catFilter');
  filterEl.innerHTML = `<button class="cat-btn active" onclick="setCat(this,'all')">全部 (${allQuestions.length})</button>` +
    cats.map(c => {
      const cnt = allQuestions.filter(q => q.category === c).length;
      return `<button class="cat-btn" onclick="setCat(this,'${c.replace(/'/g,"\\'")}')">${c} (${cnt})</button>`;
    }).join('');

  filtered = [...allQuestions];
  loaded = true;
  document.getElementById('counter').textContent = `共 ${allQuestions.length} 道题，点击「随机一题」开始`;
}

function setCat(el, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  filtered = cat === 'all' ? [...allQuestions] : allQuestions.filter(q => q.category === cat);
  history = [];
  historyIdx = -1;
  document.getElementById('counter').textContent = `已筛选 ${filtered.length} 道题`;
}

function randomCard() {
  if (!loaded || filtered.length === 0) return;
  const q = filtered[Math.floor(Math.random() * filtered.length)];
  // Add to history, trim forward
  history = history.slice(0, historyIdx + 1);
  history.push(q);
  historyIdx = history.length - 1;
  showCard(q);
}

function goCard(dir) {
  const ni = historyIdx + dir;
  if (ni < 0 || ni >= history.length) return;
  historyIdx = ni;
  showCard(history[ni]);
}

function showCard(q) {
  // Unflip
  document.getElementById('flashcard').classList.remove('flipped');

  // Front
  document.getElementById('cardNum').textContent = '#' + q.num;
  document.getElementById('cardQuestion').textContent = q.title;
  const diffEl = document.getElementById('cardDiff');
  diffEl.textContent = q.difficulty_emoji + ' ' + q.difficulty;
  diffEl.className = 'card-diff ' + (q.difficulty === '简单' ? 'easy' : q.difficulty === '中等' ? 'medium' : 'hard');

  // Back
  document.getElementById('cardNumBack').textContent = '#' + q.num;
  document.getElementById('cardTagsBack').innerHTML = (q.tags || '').split(',').map(t =>
    `<span class="card-tag">${t.trim()}</span>`
  ).join('');
  // Render markdown-ish answer
  let ans = q.answer || '暂无答案';
  ans = ans.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/`(.*?)`/g, '<code>$1</code>').replace(/\n/g, '<br>');
  document.getElementById('cardAnswer').innerHTML = ans;

  // Nav buttons
  document.getElementById('prevBtn').disabled = historyIdx <= 0;
  document.getElementById('nextBtn').disabled = historyIdx >= history.length - 1;

  // Counter
  document.getElementById('counter').textContent = `第 ${historyIdx + 1} / ${history.length} 张 · 共 ${filtered.length} 道题`;

  // Scroll to card
  document.getElementById('flashcard').scrollIntoView({behavior: 'smooth', block: 'center'});
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') goCard(-1);
  if (e.key === 'ArrowRight') goCard(1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
  if (e.key === 'Enter') randomCard();
});

loadAll();
</script>
</body>
</html>
