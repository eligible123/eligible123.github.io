<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java面试AI助手 - eligible123</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<style>
  :root {
    --primary: #4F46E5;
    --bg: #0F172A;
    --bg-card: #1E293B;
    --text: #F1F5F9;
    --text-muted: #94A3B8;
    --border: #475569;
    --accent: #22D3EE;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container { max-width: 500px; text-align: center; }
  .avatar { font-size: 64px; margin-bottom: 20px; }
  h1 {
    font-size: 28px; margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 14px; }
  .stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 32px; }
  .stat .num { font-size: 32px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .btn {
    display: inline-block; padding: 16px 40px;
    background: linear-gradient(135deg, var(--primary), #7C3AED);
    color: #fff; text-decoration: none; border-radius: 12px;
    font-size: 18px; font-weight: 600; transition: all .3s;
    box-shadow: 0 4px 20px rgba(79,70,229,.3);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(79,70,229,.4); }
  .categories {
    margin-top: 32px; display: flex; flex-wrap: wrap;
    gap: 8px; justify-content: center;
  }
  .categories span {
    background: rgba(79,70,229,.15); color: var(--primary);
    padding: 4px 12px; border-radius: 16px; font-size: 12px;
    border: 1px solid rgba(79,70,229,.3);
  }
  .footer { margin-top: 40px; color: var(--text-muted); font-size: 12px; }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <div class="container">
    <div class="avatar">🤖</div>
    <h1>Java面试AI助手</h1>
    <p class="subtitle">基于 2516 道面试题库 · 智能检索 · AI增强回答</p>
    <div class="stats">
      <div class="stat"><div class="num">2516</div><div class="label">面试题</div></div>
      <div class="stat"><div class="num">46</div><div class="label">分类</div></div>
      <div class="stat"><div class="num">AI</div><div class="label">智能回答</div></div>
    </div>
    <a class="btn" href="https://interview.cc.cd/">🚀 开始使用</a>
    <div class="categories">
      <span>Java</span><span>Spring</span><span>MySQL</span><span>Redis</span>
      <span>Kafka</span><span>Docker</span><span>K8s</span><span>Netty</span>
      <span>MyBatis</span><span>Dubbo</span><span>ES</span><span>Nginx</span>
      <span>设计模式</span><span>算法</span><span>系统设计</span>
    </div>
    <p class="footer">
      <a href="/interview-questions/">浏览全部题库</a> · 
      <a href="/">返回首页</a>
    </p>
  </div>
</body>
</html>
