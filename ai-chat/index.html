<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java面试AI助手 - eligible123</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<style>
  :root {
    --primary: #4F46E5;
    --primary-dark: #3730A3;
    --bg: #0F172A;
    --bg-card: #1E293B;
    --bg-input: #334155;
    --text: #F1F5F9;
    --text-muted: #94A3B8;
    --border: #475569;
    --accent: #22D3EE;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, var(--primary), #7C3AED);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.3);
    flex-shrink: 0;
  }
  .header .avatar {
    width: 44px; height: 44px;
    background: rgba(255,255,255,.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .header .info h1 { font-size: 16px; font-weight: 600; }
  .header .info p { font-size: 12px; opacity: .8; margin-top:2px; }
  .header .stats {
    margin-left: auto;
    text-align: right;
    font-size: 12px;
    opacity: .8;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 85%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; }
  .msg.bot  { align-self: flex-start; }
  .msg .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.7;
    font-size: 14px;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--primary);
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg .bubble code {
    background: rgba(0,0,0,.3);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "JetBrains Mono", "Fira Code", monospace;
    font-size: 13px;
  }
  .msg .bubble pre {
    background: #0D1117;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .msg .bubble pre code {
    background: none;
    padding: 0;
    color: #E6EDF3;
  }
  .msg .bubble strong { color: var(--accent); }
  .msg .bubble ul, .msg .bubble ol { padding-left: 20px; margin: 4px 0; }
  .msg .bubble li { margin: 2px 0; }
  .msg .bubble h1,.msg .bubble h2,.msg .bubble h3 { margin: 10px 0 4px; color: var(--accent); }
  .msg .bubble h2 { font-size: 16px; }
  .msg .bubble h3 { font-size: 14px; }
  .msg .bubble p { margin: 4px 0; }
  .msg .bubble blockquote {
    border-left: 3px solid var(--primary);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text-muted);
  }
  .msg .sources {
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .msg .sources span {
    display: inline-block;
    background: rgba(79,70,229,.2);
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 11px;
  }
  .msg .time {
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 8px;
  }
  .msg.user .time { text-align: right; }

  .typing { display: flex; gap: 5px; padding: 12px 16px; align-items: center; }
  .typing span {
    width: 8px; height: 8px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce .6s infinite alternate;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { to { opacity:.3; transform:translateY(-4px); } }

  .input-area {
    padding: 16px 20px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .quick-btns {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .quick-btns::-webkit-scrollbar { height: 0; }
  .quick-btns button {
    white-space: nowrap;
    background: rgba(79,70,229,.15);
    color: var(--primary);
    border: 1px solid rgba(79,70,229,.3);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .quick-btns button:hover {
    background: var(--primary);
    color: #fff;
  }
  .input-row {
    display: flex;
    gap: 10px;
  }
  .input-row textarea {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    resize: none;
    outline: none;
    font-family: inherit;
    min-height: 44px;
    max-height: 120px;
  }
  .input-row textarea:focus { border-color: var(--primary); }
  .input-row textarea::placeholder { color: var(--text-muted); }
  .input-row button {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    width: 48px;
    cursor: pointer;
    font-size: 18px;
    transition: background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .input-row button:hover { background: var(--primary-dark); }
  .input-row button:disabled { opacity: .5; cursor: not-allowed; }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .footer {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🤖</div>
  <div class="info">
    <h1>Java面试AI助手</h1>
    <p>基于2500+面试题库 · BM25语义检索 · MiMo大模型</p>
  </div>
  <div class="stats" id="stats">加载中...</div>
</div>

<div class="messages" id="messages">
  <div class="msg bot">
    <div class="bubble">
      👋 你好！我是<strong>Java面试AI助手</strong>，已收录 <strong>2516</strong> 道面试题，覆盖 <strong>46</strong> 个技术分类。
      <br><br>
      你可以问我任何Java/后端相关问题，我会从题库中智能检索并给出专业解答。
      <br><br>
      💡 <strong>试试问我：</strong>
      <ul>
        <li>HashMap的底层原理是什么？</li>
        <li>Redis有哪些数据结构？</li>
        <li>Spring Boot自动配置原理？</li>
        <li>MySQL索引失效的场景有哪些？</li>
      </ul>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="quick-btns" id="quickBtns"></div>
  <div class="input-row">
    <textarea id="input" placeholder="输入你的面试问题..." rows="1"></textarea>
    <button id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<div class="footer">
  Powered by <a href="https://eligible123.github.io">eligible123.github.io</a> · 
  <a href="/interview-questions/">浏览全部题库</a>
</div>

<script>
const API_BASE = 'https://39.106.212.219';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statsEl = document.getElementById('stats');

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

const quickQuestions = [
  "HashMap原理", "Redis数据结构", "Spring AOP",
  "MySQL索引优化", "JVM垃圾回收", "分布式锁",
  "Kafka消息顺序", "微服务设计", "线程池原理",
  "CAS与锁"
];
const quickBtnsEl = document.getElementById('quickBtns');
quickQuestions.forEach(q => {
  const btn = document.createElement('button');
  btn.textContent = q;
  btn.onclick = () => { inputEl.value = q; send(); };
  quickBtnsEl.appendChild(btn);
});

// Load stats
fetch(API_BASE + '/api/health')
  .then(r => r.json())
  .then(d => { statsEl.textContent = `📚 ${d.total_questions} 道题 · ${d.categories} 分类`; })
  .catch(() => { statsEl.textContent = '⚠️ 服务连接中'; });

function now() {
  return new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
}

function addMsg(role, html, sources) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  let srcHtml = '';
  if (sources && sources.length) {
    srcHtml = '<div class="sources">📖 参考：' +
      sources.map(s => `<span>${s.title}</span>`).join('') +
      '</div>';
  }
  div.innerHTML = `<div class="bubble">${html}</div>${srcHtml}<div class="time">${now()}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function renderMd(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

async function send() {
  const q = inputEl.value.trim();
  if (!q) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMsg('user', renderMd(q));
  sendBtn.disabled = true;
  const typingEl = addTyping();

  try {
    const resp = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: q, top_k: 5}),
    });
    const data = await resp.json();
    typingEl.remove();
    addMsg('bot', renderMd(data.answer), data.sources);
  } catch(e) {
    typingEl.remove();
    addMsg('bot', '⚠️ 服务暂时不可用，请稍后再试。<br><small>' + e.message + '</small>');
  }
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
