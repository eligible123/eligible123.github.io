*{box-sizing:border-box;margin:0;padding:0}
:root{

  --border:#e5e7eb;
  --text:#101827;
  --text-2:#374151;
  --text-3:#6b7280;
  --text-4:#9ca3af;
  --primary:#2563eb;
  --primary-2:#1d4ed8;
  --primary-soft:#eff6ff;

html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;padding-bottom:calc(74px + env(safe-area-inset-bottom))}
a{color:var(--primary);text-decoration:none}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.app{max-width:720px;margin:0 auto;min-height:100vh;background:linear-gradient(180deg,#eef4ff 0,#f6f7f9 230px)}

.content{padding:16px 14px 22px}

.hero-card h1{font-size:24px;line-height:1.18;letter-spacing:-.8px;margin-bottom:8px;position:relative;z-index:1}
.hero-card p{color:var(--text-3);font-size:14px;position:relative;z-index:1}
.home-search{margin-top:14px;display:grid;grid-template-columns:1fr auto;gap:8px;position:relative;z-index:1}
.input,.select,.textarea{width:100%;border:1px solid var(--border);border-radius:14px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.input,.select{height:44px;padding:0 12px}
.textarea{min-height:150px;padding:12px;resize:vertical}

.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.primary:active{background:var(--primary-2)}
.btn.block{width:100%}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.stat-card{background:rgba(255,255,255,.72);border:1px solid rgba(229,231,235,.9);border-radius:16px;padding:10px;position:relative;z-index:1}
.stat-card strong{display:block;font-size:18px;line-height:1.1}
.stat-card span{display:block;font-size:11px;color:var(--text-3);margin-top:3px}
.section{margin-top:18px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:10px}
.section-head h2{font-size:16px;letter-spacing:-.2px}
.section-head span,.section-link{font-size:12px;color:var(--text-3);font-weight:700}
.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

.quick-card h3{font-size:15px;margin-bottom:2px}
.quick-card p{font-size:12px;color:var(--text-3);line-height:1.45}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 2px rgba(15,23,42,.03);overflow:hidden}
.card-pad{padding:14px}
.tool-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}
.chips{display:flex;gap:8px;overflow:auto;padding:1px 2px 10px;margin:0 -2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--border);background:var(--surface);color:var(--text-2);border-radius:999px;padding:8px 11px;font-size:13px;font-weight:750}
.chip.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary)}
.list{display:flex;flex-direction:column;gap:9px}
.question-item,.article-item{width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px;color:var(--text);display:block}
.question-item:active,.article-item:active{background:var(--surface-2)}
.question-title,.article-title{font-size:15px;font-weight:800;line-height:1.45;letter-spacing:-.1px}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:3px 8px;background:var(--surface-2);color:var(--text-3);font-size:11px;font-weight:750}
.pill.easy{background:var(--green-soft);color:var(--green)}
.pill.medium{background:var(--orange-soft);color:var(--orange)}
.pill.hard{background:var(--red-soft);color:var(--red)}
.muted{color:var(--text-3)}
.small{font-size:12px}
.loading,.empty{padding:28px 14px;text-align:center;color:var(--text-3);font-size:14px}
.detail-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.back-btn{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:8px 11px;color:var(--text-2);font-size:13px;font-weight:800}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.detail-question{padding:15px;border-bottom:1px solid var(--border)}
.detail-question h2{font-size:18px;line-height:1.45;letter-spacing:-.3px;margin-top:8px}
.answer{padding:14px;background:#fbfdff;color:var(--text-2);white-space:pre-wrap;overflow-wrap:anywhere}
.answer.collapsed{display:none}
.answer h1,.answer h2,.answer h3{font-size:16px;margin:12px 0 6px}
.answer code{font-family:var(--mono);font-size:12px;background:#eef2ff;padding:1px 4px;border-radius:5px}
.reader{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.reader-head{padding:15px;border-bottom:1px solid var(--border)}
.reader-head h1{font-size:19px;line-height:1.35;letter-spacing:-.4px}
.reader-body{padding:15px;overflow-wrap:anywhere;color:var(--text-2)}

.reader-body h1{font-size:22px}.reader-body h2{font-size:18px}.reader-body h3{font-size:16px}
.reader-body p{margin:9px 0}
.reader-body img{max-width:100%;height:auto;border-radius:12px}
.reader-body pre{max-width:100%;overflow:auto;background:#0f172a;color:#e5e7eb;padding:12px;border-radius:12px;font-size:12px;line-height:1.6;margin:10px 0}
.reader-body code{font-family:var(--mono);font-size:12px;background:#f1f5f9;border-radius:5px;padding:1px 4px}
.reader-body pre code{background:transparent;padding:0}
.reader-body table{display:block;width:100%;overflow:auto;border-collapse:collapse}
.reader-body th,.reader-body td{border:1px solid var(--border);padding:7px;white-space:nowrap}
.prompt-grid{display:grid;gap:10px}
.prompt-output{min-height:260px;font-family:var(--mono);font-size:12px;line-height:1.65;background:#101827;color:#e5e7eb;border-color:#1f2937}
.file-field{position:relative;overflow:hidden}
.file-field input{position:absolute;inset:0;opacity:0}
.status{min-height:20px;color:var(--text-3);font-size:12px;margin-top:8px}
.status.ok{color:var(--green);font-weight:800}
.status.err{color:var(--red);font-weight:800}
.more-links{display:grid;gap:9px}
.more-link{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px;color:var(--text)}
.more-link strong{font-size:15px}
.more-link span{font-size:12px;color:var(--text-3);display:block}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.94);border-top:1px solid var(--border);backdrop-filter:blur(16px);padding:8px 10px calc(8px + env(safe-area-inset-bottom))}
.bottom-nav-inner{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.nav-btn{border:0;background:transparent;color:var(--text-4);border-radius:14px;padding:6px 2px;font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.nav-btn i{font-style:normal;font-size:18px;line-height:1}
.nav-btn.active{background:var(--primary-soft);color:var(--primary)}
.toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);background:#111827;color:#fff;border-radius:999px;padding:9px 13px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.wide-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
@media(min-width:560px){
  .content{padding:18px 18px 26px}
  .hero-card h1{font-size:30px}
  .quick-grid{grid-template-columns:repeat(3,1fr)}
  .prompt-grid{grid-template-columns:1fr 1fr}
  .prompt-output{min-height:430px}
}
</style>

function $(id){return document.getElementById(id)}
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g,ch=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}
function stripHtml(html){
  const div=document.createElement('div');
  div.innerHTML=html || '';
  return div.textContent.replace(/\s+/g,' ').trim();
}
function tagsOf(value){
  if(Array.isArray(value)) return value.filter(Boolean);
  if(!value) return [];
  return String(value).split(/[，,、\s]+/).map(item=>item.trim()).filter(Boolean);
}
function toast(message){
  const el=$('toast');
  el.textContent=message;
  el.classList.add('show');
  clearTimeout(toast.timer);
  toast.timer=setTimeout(()=>el.classList.remove('show'),1700);
}

async function fetchQuestions(dir){
  if(state.questionCache[dir]) return state.questionCache[dir];
  const url=`/interview-questions/${encodeURIComponent(dir)}/data.js`;
  const response=await fetch(url,{cache:'force-cache'});
  if(!response.ok) throw new Error(`题库加载失败：${response.status}`);
  const text=await response.text();
  const start=text.indexOf('[');
  const end=text.lastIndexOf(']')+1;
  if(start<0 || end<=start) throw new Error('题库格式无法识别');
  const questions=JSON.parse(text.slice(start,end));
  state.questionCache[dir]=questions;
  return questions;
}
function difficultyClass(value){
  const text=String(value || '');
  if(text.includes('简单') || text.includes('Easy')) return 'easy';
  if(text.includes('困难') || text.includes('Hard')) return 'hard';
  return 'medium';
}
function filterQuestions(questions){
  const keyword=state.questionKeyword.trim().toLowerCase();
  if(!keyword) return questions;
  return questions.filter(q=>{
    const haystack=[q.title,q.answer,tagsOf(q.tags).join(' '),q.difficulty].join(' ').toLowerCase();
    return haystack.includes(keyword);
  });
}

function detectScene(text){
  const picked=$('promptScene')?.value || 'auto';
  if(picked !== 'auto') return picked;
  const t=text.toLowerCase();
  const has=words=>words.some(word=>t.includes(word.toLowerCase()));
  if(has(['agent','rag','react','tool','工具调用','智能体','langchain','langgraph','qdrant'])) return 'agent';
  if(has(['bug','报错','代码','接口','sql','java','spring','redis','mysql','修复','性能慢','异常'])) return 'code';
  if(has(['架构','系统设计','高并发','高可用','方案','技术选型','容量','分布式'])) return 'design';
  if(has(['面试','简历','jd','候选人','八股','追问','模拟面试'])) return 'interview';
  if(has(['文章','文案','润色','改写','标题','总结','翻译','小红书','博客'])) return 'writing';
  if(has(['分析','报告','对比','竞品','原因','为什么','复盘'])) return 'analysis';
  return 'general';
}
function blockquote(text){
  return text.split(/\r?\n/).map(line=>`> ${line || ' '}`).join('\n');
}
function buildPrompt(raw,scene){
  const profile=sceneProfiles[scene];
  const compact=raw.replace(/\s+/g,' ').trim();
  return `# 标准 Prompt

## 1. Role（角色）
${profile.role}

## 2. Goal（目标）
请基于我的原始需求，产出一个高质量、结构清晰、可直接使用的结果。核心目标是：${compact}

## 3. Context（上下文）
我当前只提供了一段初始提示词，可能缺少背景、边界和验收标准。请在不编造事实的前提下，基于已有信息进行结构化处理；如果关键信息不足，请明确列出需要我补充的问题。

## 4. Audience（受众）
默认面向需要直接使用结果的人：开发者、学习者、面试准备者或项目负责人。请根据任务内容自动调整表达深度。

## 5. Input（输入）
原始提示词如下：

${blockquote(raw)}

## 6. Task（任务）
请完成：
1. 理解原始提示词真正想完成的目标；
2. 补齐缺失的上下文、约束、流程和验收标准；
3. 输出更专业、更稳定、更可执行的结果；
4. 如果存在多种理解，先说明你的判断和假设。

## 7. Workflow（执行流程）
${profile.workflow.map((item,index)=>`${index+1}. ${item}`).join('\n')}

## 8. Thinking（思考方式）
采用：${profile.thinking}。

## 9. Constraint（约束）
${profile.constraints.map(item=>`- ${item}`).join('\n')}

## 10. Output（输出格式）
${profile.output}

## 11. Quality（质量要求）
完整、专业、可落地、可维护，避免空泛表达；必要时给出取舍、风险和边界。

## 12. Verification（结果校验）
输出结束前请自检：
- 是否完整覆盖原始需求；
- 是否存在编造、遗漏或逻辑跳跃；
- 是否满足约束条件；
- 是否可以直接复制使用；
- 是否有更优、更简洁或更稳妥的方案。

## 13. Iteration（迭代机制）
如果信息不足，请先提出最多 5 个关键问题；如果可以先给出版本 1，请先输出可用结果，并在末尾列出可继续优化的方向。

## 14. Example（示例）
如任务适合示例，请给出“输入示例 → 输出示例”的对照，方便复用。

## 15. Persona（表达风格）
专业、清晰、直接，不要空话；必要时像资深顾问一样指出风险和取舍。

## 16. Success Criteria（成功标准）
${profile.success}`;
}
function optimizePrompt(){
  const raw=($('rawPrompt')?.value || '').trim();
  if(!raw){
    state.promptStatus='请先粘贴或上传一段提示词';
    renderPrompt();
    setTimeout(()=>$('rawPrompt')?.focus(),0);
    return;
  }
  const scene=detectScene(raw);
  state.detectedScene=sceneProfiles[scene].label;
  state.promptOutput=buildPrompt(raw,scene);
  state.promptStatus='已优化为标准 Prompt';
  renderPrompt();
}
function renderPrompt(){
  $('screen-prompt').innerHTML=`
    <div class="section-head">
      <div><h2 id="promptTitle">Prompt 一键优化</h2><span>把一句话补成 16 要素标准 Prompt</span></div>
    </div>
    <div class="card card-pad">
      <div class="prompt-grid">
        <div>
          <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px">
            <select class="select" id="promptScene" aria-label="选择 Prompt 场景">
              <option value="auto">自动识别场景</option>
              ${Object.entries(sceneProfiles).map(([key,item])=>`<option value="${key}">${item.label}</option>`).join('')}
            </select>
            <label class="btn file-field">上传<input type="file" accept=".txt,.md,.log,.json" onchange="loadPromptFile(event)"></label>
          </div>
          <textarea class="textarea" id="rawPrompt" placeholder="粘贴一段简单提示词，例如：帮我写一个企业级 Agentic RAG 项目，Spring Boot 和 LangChain4j 技术栈，可以写进简历。">${escapeHtml($('rawPrompt')?.value || '')}</textarea>
          <div class="wide-actions">
            <button class="btn primary" type="button" onclick="optimizePrompt()">一键优化</button>
            <button class="btn" type="button" onclick="clearPrompt()">清空</button>
          </div>
          <div class="status ${state.promptStatus.includes('已')?'ok':state.promptStatus.includes('请')?'err':''}">${escapeHtml(state.promptStatus)}${state.detectedScene?` · ${escapeHtml(state.detectedScene)}`:''}</div>
        </div>
        <div>
          <textarea class="textarea prompt-output" id="optimizedPrompt" readonly placeholder="优化结果会出现在这里">${escapeHtml(state.promptOutput)}</textarea>
          <div class="wide-actions">
            <button class="btn primary" type="button" onclick="copyPrompt()">复制结果</button>
            <button class="btn" type="button" onclick="downloadPrompt()">下载</button>
          </div>
        </div>
      </div>
    </div>
  `;
}
function clearPrompt(){
  state.promptStatus='等待输入';
  state.promptOutput='';
  state.detectedScene='';
  renderPrompt();
}
function loadPromptFile(event){
  const file=event.target.files && event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    $('rawPrompt').value=String(reader.result || '');
    state.promptStatus=`已读取：${file.name}`;
    toast('文件已读取');
  };
  reader.onerror=()=>{
    state.promptStatus='文件读取失败，请改为粘贴文本';
    renderPrompt();
  };
  reader.readAsText(file,'UTF-8');
}
async function copyPrompt(){
  const text=$('optimizedPrompt')?.value.trim();
  if(!text){optimizePrompt();return}
  try{
    await navigator.clipboard.writeText(text);
  }catch(error){
    const output=$('optimizedPrompt');
    output.select();
    document.execCommand('copy');
  }
  toast('已复制');
}
function downloadPrompt(){
  const text=$('optimizedPrompt')?.value.trim();
  if(!text){optimizePrompt();return}
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='optimized-prompt.txt';
  a.click();
  URL.revokeObjectURL(url);
}

async function loadArticles(){
  if(state.articleCache) return state.articleCache;
  const response=await fetch('/local-search.xml',{cache:'force-cache'});
  if(!response.ok) throw new Error(`文章索引加载失败：${response.status}`);
  const text=await response.text();
  const doc=new DOMParser().parseFromString(text,'application/xml');
  const entries=[...doc.querySelectorAll('entry')].map(entry=>{
    const title=entry.querySelector('title')?.textContent.trim() || '未命名文章';
    const url=entry.querySelector('url')?.textContent.trim() || entry.querySelector('link')?.getAttribute('href') || '/';
    const html=entry.querySelector('content')?.textContent || '';
    const categories=[...entry.querySelectorAll('category')].map(node=>node.textContent.trim()).filter(Boolean);
    const tags=[...entry.querySelectorAll('tag')].map(node=>node.textContent.trim()).filter(Boolean);
    return {title,url,html,text:stripHtml(html),categories,tags};
  });
  state.articleCache=entries;
  return entries;
}
function warmArticles(){
  if(state.articleCache) return;
  const run=()=>loadArticles().then(()=>{
    if($('articleCount')) $('articleCount').textContent=state.articleCache.length;
  }).catch(()=>{});
  if('requestIdleCallback' in window) requestIdleCallback(run,{timeout:1500});
  else setTimeout(run,400);
}
function filterArticles(articles){
  const keyword=state.articleKeyword.trim().toLowerCase();
  if(!keyword) return articles;
  return articles.filter(article=>[
    article.title,
    article.text,
    article.categories.join(' '),
    article.tags.join(' ')
  ].join(' ').toLowerCase().includes(keyword));
}
async function renderBlog(){
  const root=$('screen-blog');
  if(state.selectedArticle){
    renderArticleReader(root,state.selectedArticle);
    return;
  }
  root.innerHTML=`
    <div class="section-head">
      <div><h2 id="blogTitle">文章阅读</h2><span>站内文章搜索与手机阅读</span></div>
    </div>
    <div class="card card-pad">
      <div class="tool-row">
        <input class="input" type="search" placeholder="搜索文章标题 / 内容 / 标签" value="${escapeHtml(state.articleKeyword)}" oninput="state.articleKeyword=this.value;state.articleLimit=18;renderBlog()">
        <button class="btn" type="button" onclick="state.articleKeyword='';state.articleLimit=18;renderBlog()">清空</button>
      </div>
      <div id="articleListArea" class="loading">正在加载文章索引...</div>
    </div>
    <div class="section">
      <div class="section-head"><h2>PC 原页面</h2><span>需要完整桌面功能时使用</span></div>
      <div class="more-links">
        <a class="more-link" href="/archives/"><span><strong>文章归档</strong><span>完整归档页</span></span><b>›</b></a>
        <a class="more-link" href="/categories/"><span><strong>分类页</strong><span>按分类浏览</span></span><b>›</b></a>
        <a class="more-link" href="/tags/"><span><strong>标签页</strong><span>按标签浏览</span></span><b>›</b></a>
      </div>
    </div>
  `;
  try{
    const articles=await loadArticles();
    const filtered=filterArticles(articles);
    const shown=filtered.slice(0,state.articleLimit);
    const area=$('articleListArea');
    if(!filtered.length){
      area.className='empty';
      area.textContent='没有找到匹配的文章。';
      return;
    }
    area.className='';
    area.innerHTML=`
      <div class="list">
        ${shown.map((article,index)=>articleItemHtml(article,index)).join('')}
      </div>
      ${filtered.length>shown.length?`<button class="btn block" type="button" style="margin-top:10px" onclick="state.articleLimit+=18;renderBlog()">再加载 18 篇（剩余 ${filtered.length-shown.length}）</button>`:''}
    `;
  }catch(error){
    const area=$('articleListArea');
    area.className='empty';
    area.textContent=error.message || '文章索引加载失败，请稍后重试。';
  }
}
function articleItemHtml(article,index){
  const preview=article.text.slice(0,86);
  const tags=[...article.categories.slice(0,2),...article.tags.slice(0,2)].slice(0,3);
  return `
    <button class="article-item" type="button" onclick="openArticle(${index})">
      <div class="article-title">${escapeHtml(article.title)}</div>
      <p class="muted small" style="margin-top:6px">${escapeHtml(preview)}${article.text.length>86?'...':''}</p>
      <div class="meta">${tags.map(tag=>`<span class="pill">${escapeHtml(tag)}</span>`).join('')}</div>
    </button>
  `;
}
async function openArticle(index){
  const articles=filterArticles(await loadArticles());
  state.selectedArticle=articles[index];
  renderBlog();
  window.scrollTo({top:0,behavior:'smooth'});
}
function sanitizeArticleHtml(html){
  const template=document.createElement('template');
  template.innerHTML=html || '';
  template.content.querySelectorAll('script,style,iframe,object,embed,link,meta').forEach(el=>el.remove());
  template.content.querySelectorAll('*').forEach(el=>{
    [...el.attributes].forEach(attr=>{
      const name=attr.name.toLowerCase();
      const value=String(attr.value || '');
      if(name.startsWith('on')) el.removeAttribute(attr.name);
      if((name==='href' || name==='src') && /^\s*javascript:/i.test(value)) el.removeAttribute(attr.name);
    });
    if(el.tagName === 'A'){
      el.setAttribute('target','_blank');
      el.setAttribute('rel','noopener noreferrer');
    }
  });
  return template.innerHTML;
}
function renderArticleReader(root,article){
  const tags=[...article.categories,...article.tags].slice(0,6);
  root.innerHTML=`
    <div class="detail-header">
      <button class="back-btn" type="button" onclick="state.selectedArticle=null;renderBlog()">← 返回文章</button>
      <a class="back-btn" href="${escapeHtml(article.url)}">打开原文</a>
    </div>
    <article class="reader">
      <div class="reader-head">
        <h1>${escapeHtml(article.title)}</h1>
        <div class="meta">${tags.map(tag=>`<span class="pill">${escapeHtml(tag)}</span>`).join('')}</div>
      </div>
      <div class="reader-body">${sanitizeArticleHtml(article.html)}</div>
    </article>
  `;
}

function init(){
  const start=(location.hash || '#home').replace('#','');
  const allowed=['home','questions','random','prompt','blog'];
  state.tab=allowed.includes(start) ? start : 'home';
  document.querySelectorAll('.screen').forEach(el=>el.classList.toggle('active',el.id===`screen-${state.tab}`));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.toggle('active',el.dataset.tab===state.tab));
  renderActive();
}
window.addEventListener('hashchange',()=>{
  const tab=(location.hash || '#home').replace('#','');
  if(['home','questions','random','prompt','blog'].includes(tab) && tab!==state.tab){
    state.tab=tab;
    document.querySelectorAll('.screen').forEach(el=>el.classList.toggle('active',el.id===`screen-${tab}`));
    document.querySelectorAll('.nav-btn').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
    renderActive();
  }
});
init();
</script>
