<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI模拟面试 | 李阳的技术博客</title>
<meta name="description" content="AI智能模拟面试，上传简历+JD生成15道专属面试题">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #111827;
  --secondary: #374151;
  --bg: #F9FAFB;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --text: #111827;
  --subtext: #6B7280;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.navbar .container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--subtext);
  font-size: 14px;
  font-weight: 500;
}

.nav-links a:hover { color: var(--primary); }

.hero {
  padding: 100px 24px 40px;
  max-width: 1200px;
  margin: 0 auto;
}

.hero h1 {
  font-size: 36px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -1px;
  margin-bottom: 8px;
}

.hero .subtitle {
  font-size: 16px;
  color: var(--subtext);
}

.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

.section-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 16px;
}

/* Upload Section */
.upload-section {
  margin-bottom: 32px;
}

.upload-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.upload-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

.upload-card.has-file {
  border-color: var(--success);
}

.upload-card .card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.upload-card h3 {
  font-size: 15px;
  font-weight: 600;
}

.badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
}

.badge.required {
  background: #FEF2F2;
  color: #DC2626;
}

.badge.optional {
  background: #F3F4F6;
  color: var(--subtext);
}

.upload-area {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.upload-area:hover {
  border-color: var(--primary);
  background: var(--bg);
}

.upload-area .icon {
  font-size: 32px;
  margin-bottom: 8px;
}

.upload-area p {
  font-size: 14px;
  color: var(--subtext);
}

.upload-area input[type="file"] {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}

.file-info {
  display: none;
  margin-top: 12px;
  padding: 12px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 14px;
  color: var(--success);
}

.file-info.show {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.remove-btn {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 16px;
}

/* Analysis Section */
.analysis-section {
  margin-bottom: 32px;
  display: none;
}

.analysis-section.show {
  display: block;
}

.analysis-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

.analysis-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.match-score {
  display: flex;
  align-items: center;
  gap: 16px;
}

.score-circle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
}

.score-circle.high {
  background: #ECFDF5;
  color: #059669;
  border: 2px solid #10B981;
}

.score-circle.medium {
  background: #FEF3C7;
  color: #D97706;
  border: 2px solid #F59E0B;
}

.score-circle.low {
  background: #FEF2F2;
  color: #DC2626;
  border: 2px solid #EF4444;
}

.score-info h3 {
  font-size: 16px;
  font-weight: 600;
}

.score-info p {
  font-size: 14px;
  color: var(--subtext);
}

.keywords-section {
  margin-bottom: 20px;
}

.keywords-section h4 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
}

.keywords-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.keyword-tag {
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 13px;
}

.keyword-tag.hit {
  background: #ECFDF5;
  color: #059669;
}

.keyword-tag.miss {
  background: #FEF2F2;
  color: #DC2626;
}

.skills-analysis {
  background: var(--bg);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 20px;
}

.skills-analysis h4 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}

.skill-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

.skill-item:last-child {
  border-bottom: none;
}

.skill-match {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
}

.skill-match.high {
  background: #ECFDF5;
  color: #059669;
}

.skill-match.medium {
  background: #FEF3C7;
  color: #D97706;
}

.skill-match.low {
  background: #FEF2F2;
  color: #DC2626;
}

.action-buttons {
  display: flex;
  gap: 12px;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.btn.primary {
  background: var(--primary);
  color: white;
  border: none;
}

.btn.primary:hover {
  background: #1F2937;
}

.btn.secondary {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--secondary);
}

.btn.secondary:hover {
  border-color: var(--primary);
}

/* Questions Preview */
.questions-section {
  margin-bottom: 32px;
  display: none;
}

.questions-section.show {
  display: block;
}

.questions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}

.category-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.category-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.category-header .icon {
  font-size: 20px;
}

.category-header h3 {
  font-size: 15px;
  font-weight: 600;
}

.category-header .count {
  margin-left: auto;
  font-size: 12px;
  color: var(--subtext);
}

.question-list {
  padding: 12px;
}

.question-item {
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: var(--secondary);
  transition: background 0.15s;
}

.question-item:hover {
  background: var(--bg);
}

/* Interview Section */
.interview-section {
  display: none;
}

.interview-section.show {
  display: block;
}

.interview-container {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.interview-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.interview-header .status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
}

.interview-header h3 {
  font-size: 15px;
  font-weight: 600;
}

.interview-header p {
  font-size: 13px;
  color: var(--subtext);
  margin-left: auto;
}

.chat-messages {
  height: 400px;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 16px;
  display: flex;
  gap: 10px;
}

.message.user {
  flex-direction: row-reverse;
}

.message-avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.message.ai .message-avatar {
  background: var(--primary);
  color: white;
}

.message.user .message-avatar {
  background: var(--border);
}

.message-content {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.6;
}

.message.ai .message-content {
  background: var(--bg);
  border: 1px solid var(--border);
}

.message.user .message-content {
  background: var(--primary);
  color: white;
}

.message-content .meta {
  font-size: 12px;
  color: var(--subtext);
  margin-top: 6px;
}

.action-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.action-btn {
  padding: 6px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}

.action-btn:hover {
  border-color: var(--primary);
}

.chat-input {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
}

.chat-input input {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}

.chat-input input:focus {
  border-color: var(--primary);
}

.chat-input button {
  padding: 10px 20px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}

.chat-input button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Score Card */
.score-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-top: 16px;
}

.score-card h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
}

.score-card .score {
  font-size: 48px;
  font-weight: 700;
  color: var(--primary);
}

.footer {
  border-top: 1px solid var(--border);
  padding: 32px 24px;
  text-align: center;
  color: var(--subtext);
  font-size: 13px;
}

@media (max-width: 768px) {
  .hero h1 { font-size: 28px; }
  .upload-grid { grid-template-columns: 1fr; }
  .questions-grid { grid-template-columns: 1fr; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">LY.DEV</a>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/interview-questions/">题库</a></li>
      <li><a href="/ai-mock-interview/">AI面试</a></li>
      <li><a href="/random-question/">随机一题</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <h1>AI模拟面试</h1>
  <p class="subtitle">上传简历+JD → AI分析 → 15道专属面试题</p>
</section>

<div class="main">
  <!-- Upload -->
  <section class="upload-section">
    <h2 class="section-title">上传文件</h2>
    <div class="upload-grid">
      <div class="upload-card" id="resume-card">
        <div class="card-header">
          <h3>📄 个人简历</h3>
          <span class="badge required">必填</span>
        </div>
        <div class="upload-area">
          <div class="icon">📁</div>
          <p>点击或拖拽上传简历</p>
          <div style="font-size:12px;color:var(--subtext);margin-top:6px">支持 PDF、Word、TXT</div>
          <input type="file" id="resume-input" accept=".pdf,.doc,.docx,.txt" onchange="handleFile(event,'resume')">
        </div>
        <div class="file-info" id="resume-info">
          <span id="resume-name">-</span>
          <button class="remove-btn" onclick="removeFile('resume')">✕</button>
        </div>
      </div>

      <div class="upload-card" id="jd-card">
        <div class="card-header">
          <h3>💼 岗位JD</h3>
          <span class="badge required">必填</span>
        </div>
        <div class="upload-area">
          <div class="icon">📋</div>
          <p>点击或拖拽上传岗位描述</p>
          <div style="font-size:12px;color:var(--subtext);margin-top:6px">支持 PDF、Word、TXT</div>
          <input type="file" id="jd-input" accept=".pdf,.doc,.docx,.txt" onchange="handleFile(event,'jd')">
        </div>
        <div class="file-info" id="jd-info">
          <span id="jd-name">-</span>
          <button class="remove-btn" onclick="removeFile('jd')">✕</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Analysis -->
  <section class="analysis-section" id="analysis-section">
    <h2 class="section-title">分析结果</h2>
    <div class="analysis-card">
      <div class="analysis-header">
        <div class="match-score">
          <div class="score-circle" id="match-score">-</div>
          <div class="score-info">
            <h3>岗位匹配度</h3>
            <p id="match-reason">-</p>
          </div>
        </div>
      </div>

      <div class="keywords-section">
        <h4>🔑 JD核心关键词</h4>
        <div class="keywords-tags" id="keywords-tags"></div>
      </div>

      <div class="skills-analysis">
        <h4>📊 技能匹配分析</h4>
        <div id="skills-list"></div>
      </div>

      <div class="action-buttons">
        <button class="btn primary" onclick="startInterview()">🚀 开始15道专属面试</button>
        <button class="btn secondary" onclick="downloadDoc()">📥 下载面试文档</button>
      </div>
    </div>
  </section>

  <!-- Questions Preview -->
  <section class="questions-section" id="questions-section">
    <h2 class="section-title">面试题目 (15)</h2>
    <div class="questions-grid" id="questions-grid"></div>
  </section>

  <!-- Interview -->
  <section class="interview-section" id="interview-section">
    <h2 class="section-title">面试进行中</h2>
    <div class="interview-container">
      <div class="interview-header">
        <div class="status"></div>
        <h3 id="current-category">-</h3>
        <p id="question-progress">问题 1 / 15</p>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="action-bar">
        <button class="action-btn" onclick="showHint()">💡 提示</button>
        <button class="action-btn" onclick="skipQuestion()">⏭️ 跳过</button>
        <button class="action-btn" onclick="endInterview()">📊 结束</button>
      </div>
      <div class="chat-input">
        <input type="text" id="user-input" placeholder="输入你的回答..." onkeypress="handleKeyPress(event)" disabled>
        <button onclick="submitAnswer()" id="submit-btn" disabled>发送</button>
      </div>
    </div>
  </section>
</div>

<footer class="footer">
  <p>© 2026 李阳的技术博客</p>
</footer>

<script>
let resumeText = '', jdText = '';
let interviewQuestions = [];
let currentQuestionIndex = 0;

function handleFile(e, type) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    if (type === 'resume') {
      resumeText = ev.target.result;
      document.getElementById('resume-name').textContent = '✅ ' + file.name;
      document.getElementById('resume-info').classList.add('show');
      document.getElementById('resume-card').classList.add('has-file');
    } else {
      jdText = ev.target.result;
      document.getElementById('jd-name').textContent = '✅ ' + file.name;
      document.getElementById('jd-info').classList.add('show');
      document.getElementById('jd-card').classList.add('has-file');
    }
    if (resumeText && jdText) analyzeFiles();
  };
  reader.readAsText(file);
}

function removeFile(type) {
  if (type === 'resume') {
    resumeText = '';
    document.getElementById('resume-input').value = '';
    document.getElementById('resume-info').classList.remove('show');
    document.getElementById('resume-card').classList.remove('has-file');
  } else {
    jdText = '';
    document.getElementById('jd-input').value = '';
    document.getElementById('jd-info').classList.remove('show');
    document.getElementById('jd-card').classList.remove('has-file');
  }
}

function analyzeFiles() {
  const section = document.getElementById('analysis-section');
  section.classList.add('show');

  // Simulate analysis
  const keywords = extractKeywords(jdText);
  const hitKeywords = keywords.filter(k => resumeText.includes(k));
  const missKeywords = keywords.filter(k => !resumeText.includes(k));

  const matchRate = Math.round(hitKeywords.length / Math.max(keywords.length, 1) * 100);
  const circle = document.getElementById('match-score');
  circle.textContent = matchRate + '%';
  circle.className = 'score-circle ' + (matchRate >= 70 ? 'high' : matchRate >= 40 ? 'medium' : 'low');

  document.getElementById('match-reason').textContent = matchRate >= 70 ? '简历与岗位高度匹配' : matchRate >= 40 ? '简历与岗位部分匹配' : '简历与岗位匹配度较低';

  document.getElementById('keywords-tags').innerHTML = 
    hitKeywords.map(k => `<span class="keyword-tag hit">✅ ${k}</span>`).join('') +
    missKeywords.map(k => `<span class="keyword-tag miss">❌ ${k}</span>`).join('');

  const skills = extractSkills(resumeText, jdText);
  document.getElementById('skills-list').innerHTML = skills.map(s => `
    <div class="skill-item">
      <span>${s.name}</span>
      <span class="skill-match ${s.match}">${s.match === 'high' ? '完全匹配' : s.match === 'medium' ? '部分匹配' : '需补充'}</span>
    </div>
  `).join('');

  generateQuestions(skills);
  section.scrollIntoView({ behavior: 'smooth' });
}

function extractKeywords(text) {
  const patterns = [/Java|Spring|MySQL|Redis|Docker|K8s/gi, /微服务|分布式|高并发/gi, /Python|Go|AI|LLM/gi];
  const keywords = [];
  patterns.forEach(p => { const m = text.match(p); if (m) keywords.push(...m); });
  return [...new Set(keywords)].slice(0, 10);
}

function extractSkills(resume, jd) {
  const skillMap = { 'Java': ['Java'], 'Spring': ['Spring'], '数据库': ['MySQL','Redis'], '中间件': ['Kafka','RabbitMQ'], '容器化': ['Docker','K8s'], '分布式': ['分布式','微服务'], 'AI': ['AI','LLM'] };
  const skills = [];
  const text = resume + ' ' + jd;
  for (const [name, keywords] of Object.entries(skillMap)) {
    if (keywords.some(k => text.includes(k))) {
      const inResume = keywords.some(k => resume.includes(k));
      const inJd = keywords.some(k => jd.includes(k));
      skills.push({ name, match: inResume && inJd ? 'high' : (inResume || inJd ? 'medium' : 'low') });
    }
  }
  return skills;
}

function generateQuestions(skills) {
  const categories = [
    { name: '自我介绍', icon: '👤', questions: [{ q: '请用1-2分钟做一个自我介绍', a: '突出与岗位相关的经验和技能', tips: '简洁明了' }] },
    { name: '简历深挖', icon: '📝', questions: [{ q: '请介绍你最有挑战的项目', a: '用STAR法则描述', tips: '突出技术难点' }] },
    { name: '专业问题', icon: '💻', questions: skills.slice(0,3).map(s => ({ q: `请介绍${s.name}的核心原理`, a: `结合项目经验回答`, tips: '讲清楚原理' })) },
    { name: '行为面试', icon: '🤝', questions: [{ q: '如何处理技术分歧？', a: '用数据和事实说话', tips: '展现沟通能力' }] },
    { name: '情景面试', icon: '🎯', questions: [{ q: '线上bug如何处理？', a: '快速定位、评估影响、制定方案', tips: '展现问题处理能力' }] },
    { name: '压力面试', icon: '💪', questions: [{ q: '你的缺点是什么？', a: '真实但不致命，说明改进', tips: '诚实且积极' }] },
    { name: '反问环节', icon: '❓', questions: [{ q: '你有什么想问的？', a: '问团队、技术栈、发展', tips: '展现兴趣' }] }
  ];

  interviewQuestions = categories;
  const grid = document.getElementById('questions-grid');
  grid.innerHTML = categories.map(cat => `
    <div class="category-card">
      <div class="category-header">
        <span class="icon">${cat.icon}</span>
        <h3>${cat.name}</h3>
        <span class="count">${cat.questions.length}题</span>
      </div>
      <div class="question-list">
        ${cat.questions.map((q, i) => `<div class="question-item" onclick="startSpecific(${categories.indexOf(cat)},${i})">Q${i+1}: ${q.q}</div>`).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('questions-section').classList.add('show');
}

function startInterview() {
  document.getElementById('interview-section').classList.add('show');
  document.getElementById('user-input').disabled = false;
  document.getElementById('submit-btn').disabled = false;

  const allQ = [];
  interviewQuestions.forEach(cat => cat.questions.forEach(q => allQ.push({ ...q, category: cat.name })));

  addMessage('ai', `👋 你好！基于你的简历和岗位JD，我准备了15道专属面试题。

📋 分类：${interviewQuestions.map(c => c.icon + c.name).join('、')}

让我们开始吧！`);
  document.getElementById('interview-section').scrollIntoView({ behavior: 'smooth' });
}

function startSpecific(catIdx, qIdx) {
  document.getElementById('interview-section').classList.add('show');
  document.getElementById('user-input').disabled = false;
  document.getElementById('submit-btn').disabled = false;

  let globalIdx = 0;
  for (let i = 0; i < catIdx; i++) globalIdx += interviewQuestions[i].questions.length;
  globalIdx += qIdx;

  currentQuestionIndex = globalIdx;
  const cat = interviewQuestions[catIdx];
  const q = cat.questions[qIdx];

  addMessage('ai', `🎯 **${cat.name}** - 问题 ${globalIdx + 1}/15\n\n${q.q}`);
  document.getElementById('current-category').textContent = cat.name;
  document.getElementById('question-progress').textContent = `问题 ${globalIdx + 1} / 15`;
  document.getElementById('interview-section').scrollIntoView({ behavior: 'smooth' });
}

function addMessage(role, content) {
  const messages = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `
    <div class="message-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
    <div class="message-content">
      ${content.replace(/\n/g, '<br>')}
      <div class="meta">${role === 'ai' ? 'AI面试官' : '你'} · ${time}</div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function submitAnswer() {
  const input = document.getElementById('user-input');
  const answer = input.value.trim();
  if (!answer) return;
  addMessage('user', answer);
  input.value = '';

  const allQ = [];
  interviewQuestions.forEach(cat => cat.questions.forEach(q => allQ.push({ ...q, category: cat.name })));

  if (currentQuestionIndex >= allQ.length) { endInterview(); return; }

  const q = allQ[currentQuestionIndex];

  addMessage('ai', `💡 **参考答案**：${q.a}\n\n📌 **技巧**：${q.tips}`);

  currentQuestionIndex++;
  if (currentQuestionIndex < allQ.length) {
    const nextQ = allQ[currentQuestionIndex];
    setTimeout(() => {
      addMessage('ai', `---\n\n**问题 ${currentQuestionIndex + 1}/15** [${nextQ.category}]\n\n${nextQ.q}`);
      document.getElementById('current-category').textContent = nextQ.category;
      document.getElementById('question-progress').textContent = `问题 ${currentQuestionIndex + 1} / 15`;
    }, 1000);
  } else {
    setTimeout(endInterview, 1000);
  }
}

function showHint() {
  const allQ = [];
  interviewQuestions.forEach(cat => cat.questions.forEach(q => allQ.push(q)));
  if (currentQuestionIndex < allQ.length) {
    addMessage('ai', `💡 **提示**：${allQ[currentQuestionIndex].tips}`);
  }
}

function skipQuestion() {
  currentQuestionIndex++;
  const allQ = [];
  interviewQuestions.forEach(cat => cat.questions.forEach(q => allQ.push(q)));
  if (currentQuestionIndex < allQ.length) {
    addMessage('ai', `⏭️ 已跳过\n\n**问题 ${currentQuestionIndex + 1}/15**\n\n${allQ[currentQuestionIndex].q}`);
  } else {
    endInterview();
  }
}

function endInterview() {
  addMessage('ai', `📊 **面试结束**\n\n✅ 已完成所有面试题\n\n💡 请查看参考答案，总结自己的回答，不断提升！`);
  document.getElementById('user-input').disabled = true;
  document.getElementById('submit-btn').disabled = true;
}

function handleKeyPress(e) {
  if (e.key === 'Enter') submitAnswer();
}

function downloadDoc() {
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>面试文档</title>
  <style>body{font-family:Inter,sans-serif;max-width:800px;margin:0 auto;padding:40px 20px;color:#1f2937}
  h1{font-size:24px;border-bottom:2px solid #e5e7eb;padding-bottom:12px}
  h2{font-size:18px;margin:24px 0 12px;color:#111827}
  .card{background:#f9fafb;padding:16px;border-radius:8px;margin:12px 0}
  .q{font-weight:600;margin-bottom:8px}.tip{color:#6b7280;font-size:13px}</style></head><body>
  <h1>🎯 面试准备文档</h1><p>基于简历+岗位JD定制 · 共15道面试题</p>`;

  interviewQuestions.forEach(cat => {
    html += `<h2>${cat.icon} ${cat.name}</h2>`;
    cat.questions.forEach((q, i) => {
      html += `<div class="card"><div class="q">Q${i+1}: ${q.q}</div><p>${q.a}</p><div class="tip">💡 ${q.tips}</div></div>`;
    });
  });

  html += '</body></html>';
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'interview_prep.html';
  a.click();
}
