<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 模拟面试 | 八股面试</title>
<meta name="description" content="AI 面试官 - P8级压力面试，简历定制追问，实时评分">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #111827;
  --secondary: #374151;
  --bg: #F9FAFB;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --text: #111827;
  --subtext: #6B7280;
  --accent: #10B981;
  --accent-light: #D1FAE5;
  --accent-dark: #059669;
  --danger: #EF4444;
  --danger-light: #FEE2E2;
  --warning: #F59E0B;
  --warning-light: #FEF3C7;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 6px rgba(0,0,0,.06);
}

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Navbar */
.navbar {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
.nav-left { display: flex; align-items: center; gap: 12px; }
.nav-left a { text-decoration: none; font-size: 18px; font-weight: 700; color: var(--primary); }
.nav-left .sep { color: var(--border); font-size: 18px; }
.nav-left .page-title { font-size: 15px; font-weight: 600; color: var(--secondary); }
.nav-right { display: flex; gap: 8px; }
.nav-btn {
  padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .15s; border: 1px solid var(--border);
  background: var(--card); color: var(--secondary);
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
.nav-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.nav-btn.primary:hover { background: var(--accent-dark); }
.nav-btn:disabled {
  opacity: .45;
  cursor: not-allowed;
}
.nav-btn:disabled:hover {
  background: var(--card);
  border-color: var(--border);
  color: var(--secondary);
}

/* Main Layout */
.main-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Settings Panel */
.settings-panel {
  display: none; background: var(--card); border-bottom: 1px solid var(--border);
  padding: 20px 24px; flex-shrink: 0;
}
.settings-panel.active { display: block; }
.settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--subtext); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.field input, .field select {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; color: var(--text); background: var(--bg); transition: border-color .15s;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
.field select option { background: var(--card); }
.model-field { position: relative; }
.refresh-btn {
  position: absolute; right: 4px; bottom: 4px; width: 28px; height: 28px;
  border-radius: 6px; border: none; background: var(--bg); color: var(--subtext);
  cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.refresh-btn:hover { color: var(--accent); }
.refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.settings-actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
.test-result { font-size: 12px; padding: 6px 10px; border-radius: 6px; display: none; }
.test-result.show { display: inline-block; }
.test-result.success { background: var(--accent-light); color: var(--accent-dark); }
.test-result.error { background: var(--danger-light); color: var(--danger); }
.api-badge { font-size: 12px; color: var(--subtext); display: flex; align-items: center; gap: 6px; margin-left: auto; }
.api-dot { width: 6px; height: 6px; border-radius: 50%; }
.api-dot.ok { background: var(--accent); }
.api-dot.err { background: var(--danger); }
.api-dot.pending { background: var(--warning); }

/* Resume Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card); border-radius: 16px; padding: 28px; width: 520px;
  max-width: 90vw; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15);
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal .sub { font-size: 13px; color: var(--subtext); margin-bottom: 16px; }
.material-section { margin-top: 16px; }
.material-section + .material-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
.material-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.material-head label { font-size: 13px; font-weight: 700; color: var(--text); }
.material-tag { flex: 0 0 auto; padding: 2px 8px; border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--subtext); background: var(--bg); }
.material-tag.required { border-color: #A7F3D0; color: var(--accent-dark); background: var(--accent-light); }
.modal textarea {
  width: 100%; min-height: 150px; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; line-height: 1.55; color: var(--text); background: var(--bg); resize: vertical; font-family: inherit;
}
.modal textarea.jd-textarea { min-height: 96px; max-height: 160px; }
.modal textarea.resume-textarea { min-height: 150px; max-height: 240px; }
.modal textarea:focus { outline: none; border-color: var(--accent); }
.char-count { font-size: 11px; color: var(--subtext); text-align: right; margin-top: 4px; }
.file-upload { margin-top: 12px; }
.file-upload label {
  display: block; padding: 12px; border: 2px dashed var(--border); border-radius: 8px;
  text-align: center; font-size: 13px; color: var(--subtext); cursor: pointer; transition: all .15s;
}
.file-upload label:hover { border-color: var(--accent); color: var(--accent); }
.file-upload input { display: none; }
.file-info { font-size: 12px; color: var(--accent); margin-top: 6px; display: none; }
.file-info.show { display: block; }
.modal-actions { margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-cancel { background: var(--bg); border: 1px solid var(--border); color: var(--secondary); }
.btn-cancel:hover { border-color: var(--subtext); }
.btn-confirm { background: var(--accent); border: none; color: #fff; }
.btn-confirm:hover { background: var(--accent-dark); }

/* Chat Area */
.chat-area { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Messages */
.message { margin-bottom: 20px; display: flex; gap: 12px; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }
.msg-avatar {
  width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0;
}
.msg-avatar.ai { background: var(--accent-light); }
.msg-avatar.user { background: #E0E7FF; }
.msg-content { flex: 1; min-width: 0; }
.msg-name { font-size: 12px; font-weight: 600; color: var(--subtext); margin-bottom: 4px; }
.msg-bubble {
  background: var(--card); border: 1px solid var(--border); border-radius: 2px var(--radius) var(--radius) var(--radius);
  padding: 14px 16px; font-size: 14px; line-height: 1.75; white-space: pre-wrap; word-break: break-word;
  box-shadow: var(--shadow);
}
.msg-bubble.user { background: var(--accent-light); border-color: #A7F3D0; }
.msg-bubble strong { color: var(--accent-dark); }
.msg-bubble code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; }
.msg-bubble pre { background: var(--primary); border-radius: 8px; padding: 12px; margin: 8px 0; overflow-x: auto; }
.msg-bubble pre code { background: none; color: #E5E7EB; padding: 0; }

/* System Message */
.sys-msg { text-align: center; margin: 16px 0; }
.sys-msg span {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 16px; font-size: 12px; color: var(--subtext);
}

/* Typing */
.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }

/* Welcome */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; }
.welcome-icon { font-size: 56px; margin-bottom: 16px; }
.welcome h2 { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
.welcome p { color: var(--subtext); font-size: 14px; max-width: 420px; line-height: 1.7; margin-bottom: 24px; }
.welcome .start-btn {
  background: var(--accent); border: none; color: #fff; padding: 12px 36px;
  border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.welcome .start-btn:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(16,185,129,.25); }
.welcome .features { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; justify-content: center; }
.welcome .feature {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; font-size: 12px; color: var(--subtext); min-width: 120px;
  box-shadow: var(--shadow);
}
.welcome .feature .icon { font-size: 22px; margin-bottom: 6px; }

/* Input Area */
.input-area { background: var(--card); border-top: 1px solid var(--border); padding: 14px 24px; flex-shrink: 0; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.input-row textarea {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px;
  font-size: 14px; color: var(--text); background: var(--bg); resize: none;
  max-height: 120px; line-height: 1.5; font-family: inherit;
}
.input-row textarea:focus { outline: none; border-color: var(--accent); }
.input-row textarea::placeholder { color: #9CA3AF; }
.input-row textarea:disabled { opacity: .4; cursor: not-allowed; }
.send-btn {
  width: 40px; height: 40px; border-radius: 10px; background: var(--accent);
  border: none; color: #fff; font-size: 18px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.send-btn:hover:not(:disabled) { background: var(--accent-dark); }
.send-btn:disabled { opacity: .3; cursor: not-allowed; }

@media (max-width: 768px) {
  .settings-grid { grid-template-columns: 1fr; }
  .welcome .features { flex-direction: column; align-items: center; }
  .navbar { padding: 0 16px; }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="nav-left">
    <a href="/">八股面试</a>
    <span class="sep">/</span>
    <span class="page-title">AI 模拟面试</span>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="toggleSettings()">⚙️ API设置</button>
    <button class="nav-btn" onclick="showResumeModal()">📄 上传简历</button>
    <button class="nav-btn" onclick="exportInterviewTranscript()" style="display:none" id="exportBtn" disabled>⬇️ 导出对话</button>
    <button class="nav-btn danger" onclick="endInterview()" style="display:none" id="endBtn">结束面试</button>
  </div>
</div>

<!-- Settings -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-grid">
    <div class="field">
      <label>API Base URL</label>
      <input type="text" id="apiUrl" placeholder="https://api.deepseek.com/v1">
    </div>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">
    </div>
    <div class="field model-field">
      <label>模型名称</label>
      <select id="modelName" onchange="onModelSelect()">
        <option value="">填写URL和Key后点击刷新</option>
      </select>
      <button class="refresh-btn" onclick="fetchModels()" id="refreshBtn" title="获取模型列表">↻</button>
    </div>
    <div style="padding-bottom:2px">
      <button class="nav-btn" onclick="testConnection()" id="testBtn">🔗 测试</button>
    </div>
  </div>
  <div class="settings-actions">
    <button class="nav-btn primary" onclick="saveSettings()">💾 保存配置</button>
    <span class="test-result" id="testResult"></span>
    <span class="api-badge">
      <span class="api-dot pending" id="apiDot"></span>
      <span id="apiStatusText">未配置</span>
    </span>
  </div>
</div>

<!-- Resume Modal -->
<div class="modal-overlay" id="resumeModal">
  <div class="modal">
    <h2>📄 上传面试材料</h2>
    <p class="sub">岗位 JD 可选，个人简历必填；面试官会结合两者定制追问</p>

    <div class="material-section">
      <div class="material-head">
        <label for="jdText">岗位 JD（可选）</label>
        <span class="material-tag">可选</span>
      </div>
      <textarea id="jdText" class="jd-textarea" placeholder="粘贴岗位 JD，例如：岗位职责、技术栈、任职要求、加分项..."></textarea>
      <div class="char-count"><span id="jdCharCount">0</span> 字</div>
      <div class="file-upload">
        <label for="jdFileInput">📁 上传 JD 文件 (.txt, .md, .pdf, .docx)</label>
        <input type="file" id="jdFileInput" accept=".txt,.md,.pdf,.docx" onchange="handleFile(this, 'jd')">
      </div>
      <div class="file-info" id="jdFileInfo"></div>
    </div>

    <div class="material-section">
      <div class="material-head">
        <label for="resumeText">个人简历（必填）</label>
        <span class="material-tag required">必填</span>
      </div>
      <textarea id="resumeText" class="resume-textarea" placeholder="粘贴你的个人简历...&#10;&#10;例如：&#10;姓名：张三&#10;专业：计算机科学&#10;技能：Python, React, MySQL&#10;项目：电商系统开发..."></textarea>
      <div class="char-count"><span id="charCount">0</span> 字</div>
      <div class="file-upload">
        <label for="fileInput">📁 上传简历文件 (.txt, .md, .pdf, .docx)</label>
        <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx" onchange="handleFile(this, 'resume')">
      </div>
      <div class="file-info" id="fileInfo"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeResumeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmResume()">确认上传</button>
    </div>
  </div>
</div>

<!-- Chat -->
<div class="main-wrap">
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">🤖</div>
      <h2>P8 级 AI 面试官</h2>
      <p>我会根据你的简历深度追问，递归 5 层考察真实能力。没有提示，没有安慰，只有真实的面试压力。</p>
      <button class="start-btn" onclick="startInterview()">开始面试</button>
      <div class="features">
        <div class="feature"><div class="icon">🔍</div>项目真实性审查</div>
        <div class="feature"><div class="icon">🔥</div>递归深度追问</div>
        <div class="feature"><div class="icon">📊</div>三维能力评分</div>
        <div class="feature"><div class="icon">🎯</div>人才画像分析</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="输入你的回答..." disabled onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// ====== State ======
let apiUrl = localStorage.getItem('ai_interview_url') || 'https://api.deepseek.com/v1';
let apiKey = localStorage.getItem('ai_interview_key') || '';
let modelName = localStorage.getItem('ai_interview_model') || 'deepseek-chat';
let resumeContent = localStorage.getItem('ai_interview_resume') || '';
let jdContent = localStorage.getItem('ai_interview_jd') || '';
let messages = [];
let isStreaming = false;
let abortController = null;
let interviewEnded = false;
let responseSeq = 0;

const CORS_PROXY = '';

// ====== System Prompt ======
const SYSTEM_PROMPT = `## 面试官模块 - P8级技术面试官

## 角色设定
你是一位严格的P8级技术面试官。你的目标是通过深度技术追问，精确评估候选人的真实能力水平。
你必须表现得专业、冷淡、不苟言笑。不要给候选人任何提示或安慰。

## 面试流程
1. **开场**：简短自我介绍，直接进入技术问题
2. **递归追问**：每个问题必须深入追问5层
   - L1: 概念定义（"说说这是什么"）
   - L2: 原理机制（"为什么是这样"）
   - L3: 源码/实现（"怎么实现的"）
   - L4: 工程权衡（"为什么选这个方案"）
   - L5: 极端场景（"如果XX条件变化会怎样"）
3. **项目审查**：针对简历中的项目深度追问
   - 你负责哪个模块？具体代码量？
   - 遇到最难的技术问题？怎么解决的？
   - 如果重新做，会改什么？
4. **场景设计**：给出具体业务场景，要求设计方案
5. **代码验证**：要求手写关键代码片段或SQL

## 评分规则
- 技术能力：0-10分（概念准确性、深度理解、源码熟悉度）
- 项目真实性：0-10分（细节丰富度、问题解决思路、权衡考量）
- 架构能力：0-10分（系统设计、扩展性、性能优化）

## 禁止事项
- 不要给候选人任何提示
- 不要说"答得不错"之类的安慰话
- 不要主动跳过问题
- 不要降低追问深度

## 面试结束
当候选人要求结束面试，或系统发送面试复盘指令时，停止继续追问，改为基于本轮全部对话、岗位 JD 和候选人简历生成完整复盘报告。`;

const REVIEW_PROMPT = "# AI 面试官——面试结束复盘模块\\n\\n请停止继续追问，基于本轮完整面试对话、岗位 JD、候选人简历和候选人所有回答，生成一份完整、专业、可执行的《面试复盘报告》。\\n\\n复盘不仅关注技术问题，还要从表达能力、职业素养、岗位匹配、成长建议等多个维度分析。评价必须专业、客观、有依据，避免空泛鼓励或过度否定。所有判断都要尽量引用或概括候选人的具体回答作为依据；如果信息不足，明确写出“依据不足”以及下一轮应补充的信息。\\n\\n## 输出总要求\\n- 必须客观、真实，不盲目鼓励，也不过度否定。\\n- 优先指出影响面试结果的关键问题，并按重要性排序。\\n- 建议必须具体、可执行，避免“加强基础”“多练项目”这种空话。\\n- 根据岗位类型动态调整评价维度与专业内容，不局限于技术岗位。\\n- 如果岗位不是技术岗，将“技术/专业问题复盘”替换为对应专业领域复盘，例如财务、产品、运营、法律、医疗、教育、市场、人力、设计、建筑、金融、制造、行政、销售、采购等。\\n- 最终目标不是简单评分，而是帮助候选人持续提升面试能力与职业竞争力。\\n\\n## 一、 一句话总结（Executive Summary）\\n用 1~3 句话总结本轮面试表现，必须包括：整体表现、最大优势、最大短板、是否达到目标岗位要求。\\n\\n## 二、 表达能力分析（Communication）\\n重点分析回答方式，而不仅仅是回答内容。覆盖：回答结构（STAR、金字塔、总分总等）、逻辑性、条理性、信息密度、是否抓住问题重点、是否绕弯或跑题、表达是否自然、有说服力、回答节奏、专业术语使用、自信程度、临场反应、沟通能力和性格画像。\\n最后必须输出：优点、缺点、修改建议、示例回答。\\n\\n## 三、 技术/专业问题复盘（Knowledge Review）\\n针对本轮所有问题逐题分析。每一道题都输出：面试官真正考察点、标准答案、最佳回答示例、用户回答分析、存在的问题、漏掉的知识点、最容易被追问的位置、延伸知识、推荐学习内容。\\n如果属于非技术岗位，则替换为对应专业领域知识，例如财务、产品、运营、法律、医疗、教育、市场、人力资源、设计、建筑、金融、制造、行政、销售、采购等所有职业。\\n\\n## 四、 项目/经历真实性分析（Authenticity）\\n分析回答是否像真正做过，而不是背答案。包括：哪些回答可信、哪些像背八股或模板话术、哪些数据缺少来源、哪些描述存在漏洞、哪些项目细节容易穿帮、哪些地方会被继续追问、哪些经历建议补充数据、哪些地方需要增加真实业务背景。\\n最后给出真实性评分，使用 100 分制，并说明扣分依据。\\n\\n## 五、 面试官追问预测（Follow-up）\\n模拟真实面试官，根据候选人的回答预测：如果继续面试，下一句最可能问什么。\\n至少生成 5~15 个追问。每个追问必须说明为什么会追问。\\n\\n## 六、 岗位匹配分析（Job Fit）\\n结合目标岗位分析：岗位要求、当前优势、当前不足、与优秀候选人的差距、哪些经历最加分、哪些经历建议弱化、哪些内容建议重点突出、简历需要修改哪些地方、面试回答如何更贴近 JD。\\n最后输出岗位匹配度，使用百分制。\\n\\n## 七、 综合评分（Hiring Decision）\\n模拟真实企业评价。至少包含：专业能力、项目能力、表达能力、沟通能力、逻辑能力、学习能力、抗压能力、临场反应、综合素质。\\n输出：总评分（100 分）、是否推荐录用、是否进入下一轮、推荐等级（S/A/B/C）、原因说明。\\n\\n## 八、 能力雷达图（Universal Competency Radar）\\n生成通用职业能力雷达图，不要局限于 Java、AI 或某一个行业，要根据目标岗位动态调整能力维度。\\n可选能力池包括但不限于：通用职业能力（专业知识、学习能力、沟通表达、逻辑思维、问题分析、创新能力、执行力、责任心、团队协作、抗压能力、时间管理、自驱力、职业素养、商业意识、用户意识、数据分析、文档能力、汇报能力、决策能力、领导力、风险意识、细节把控、应变能力）；技术岗位（编程能力、系统设计、数据库、网络、操作系统、算法、架构设计、AI/Agent、工程实践、Debug 能力、性能优化、安全意识、DevOps、云计算）；财务岗位（财务核算、成本分析、税务知识、Excel、ERP、财务分析、风险控制、内控管理）；产品岗位（产品思维、用户研究、PRD、原型设计、数据分析、商业分析、项目推进）；销售岗位（客户沟通、商务谈判、市场分析、成交能力、客户维护）；设计岗位（审美能力、创意能力、交互设计、UI/UX、品牌设计）。\\n请选择最适合目标岗位的 8~12 项能力。每项能力都要给出：评分（100 分制）、评分原因、提升建议。\\n\\n## 九、 学习路线（Learning Roadmap）\\n根据薄弱项生成可执行学习计划，分为：今天应该学什么、本周应该学什么、本月应该提升什么。每个阶段包括：推荐知识点、推荐项目、推荐实践、推荐阅读资料、推荐练习方式。\\n\\n## 十、 高频问题统计（History）\\n统计本轮以及历史面试中重复出现的问题。如果历史数据不足，就只分析本轮，并明确说明。\\n重点识别：经常回答不完整、经常没有先给结论、经常项目细节不足、经常缺少数据支撑、经常逻辑混乱、经常缺少业务背景、经常回答过长、经常专业术语错误。分析是否存在长期问题，并给出针对性建议。\\n\\n## 十一、 下一轮提升计划（Next Interview Plan）\\n如果只有 1 天、3 天、7 天准备时间，应分别如何准备。\\n每个时间窗口必须包括：优先学习内容、必练知识点、必练项目、高频模拟题、面试技巧、时间安排。\\n\\n请用 Markdown 输出，结构清晰，结论前置，评分有依据，建议可执行。";

// ====== Init ======
function init() {
  document.getElementById('apiUrl').value = apiUrl;
  document.getElementById('apiKey').value = apiKey;
  if (apiKey) updateApiStatus('pending', '已配置，未验证');
  if (apiKey && apiUrl) setTimeout(() => fetchModels(), 500);
  if (jdContent) document.getElementById('jdText').value = jdContent;
  if (resumeContent) document.getElementById('resumeText').value = resumeContent;
  updateCharCount();
}

// ====== Settings ======
function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('active'); }

function saveSettings() {
  apiUrl = document.getElementById('apiUrl').value.trim();
  apiKey = document.getElementById('apiKey').value.trim();
  modelName = document.getElementById('modelName').value;
  localStorage.setItem('ai_interview_url', apiUrl);
  localStorage.setItem('ai_interview_key', apiKey);
  localStorage.setItem('ai_interview_model', modelName);
  updateApiStatus('ok', '已保存');
  toggleSettings();
}

function updateApiStatus(s, t) {
  document.getElementById('apiDot').className = 'api-dot ' + s;
  document.getElementById('apiStatusText').textContent = t;
}

// ====== Fetch Models ======
async function fetchModels() {
  const url = document.getElementById('apiUrl').value.trim();
  const key = document.getElementById('apiKey').value.trim();
  if (!url || !key) { showTestResult('请先填写 URL 和 Key', 'error'); return; }

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  const sel = document.getElementById('modelName');
  sel.innerHTML = '<option value="">加载中...</option>';

  try {
    // 自动补全 /v1 前缀（如果 URL 不以 /v1 开头）
    let baseUrl = url.replace(/\/chat\/completions$/, '').replace(/\/$/, '');
    if (!baseUrl.endsWith('/v1')) {
      baseUrl = baseUrl.replace(/\/$/, '') + '/v1';
    }
    const modelsUrl = baseUrl + '/models';
    const res = await fetch(modelsUrl, { headers: { 'Authorization': 'Bearer ' + key } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const models = data.data || data.models || [];

    sel.innerHTML = '';
    if (!models.length) {
      sel.innerHTML = '<option value="auto">auto</option>';
      document.getElementById('modelName').value = 'auto';
      showTestResult('✅ 模型列表为空，默认使用 auto', 'success');
    } else {
      const d = document.createElement('option'); d.value = ''; d.textContent = '-- 请选择 (' + models.length + '个) --'; sel.appendChild(d);
      models.forEach(m => { const o = document.createElement('option'); o.value = m.id || m.name; o.textContent = m.id || m.name; sel.appendChild(o); });
      const saved = localStorage.getItem('ai_interview_model');
      if (saved) for (let o of sel.options) if (o.value === saved) { o.selected = true; break; }
      showTestResult('✅ 获取到 ' + models.length + ' 个模型', 'success');
    }
  } catch (e) {
    sel.innerHTML = '<option value="auto">auto</option>';
    document.getElementById('modelName').value = 'auto';
    showTestResult('⚠️ 模型列表获取失败（' + e.message + '），已默认使用 auto', 'success');
  } finally { btn.classList.remove('spinning'); }
}

function onModelSelect() {
  const sel = document.getElementById('modelName');
  if (sel.value === '__manual__') {
    const name = prompt('请输入模型名称：');
    if (name) { const o = document.createElement('option'); o.value = name; o.textContent = name + ' (手动)'; o.selected = true; sel.insertBefore(o, sel.lastElementChild); }
    else sel.value = '';
  }
}

// ====== Test Connection ======
async function testConnection() {
  const url = document.getElementById('apiUrl').value.trim();
  const key = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('modelName').value;
  if (!url || !key) { showTestResult('请填写 URL 和 Key', 'error'); return; }
  if (!model) { showTestResult('请先选择模型', 'error'); return; }

  const btn = document.getElementById('testBtn');
  btn.textContent = '⏳'; btn.disabled = true;
  try {
    // 自动补全 /v1 前缀
    let baseUrl = url.replace(/\/chat\/completions$/, '').replace(/\/$/, '');
    if (!baseUrl.endsWith('/v1')) {
      baseUrl = baseUrl.replace(/\/$/, '') + '/v1';
    }
    const chatUrl = baseUrl + '/chat/completions';
    const res = await fetch(chatUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model, messages: [{ role: 'user', content: 'hi' }], max_tokens: 5 })
    });
    if (!res.ok) { const t = await res.text(); throw new Error('HTTP ' + res.status + ': ' + t.slice(0, 80)); }
    const data = await res.json();
    if (data.choices || data.id) { showTestResult('✅ 连接成功！模型: ' + model, 'success'); updateApiStatus('ok', '已验证 ✓'); }
    else throw new Error('异常响应');
  } catch (e) { showTestResult('❌ ' + e.message, 'error'); updateApiStatus('err', '连接失败'); }
  finally { btn.textContent = '🔗 测试'; btn.disabled = false; }
}

function showTestResult(msg, type) {
  const el = document.getElementById('testResult');
  el.textContent = msg; el.className = 'test-result show ' + type;
}

function handleFile(input, target = 'resume') {
  const file = input.files[0]; if (!file) return;
  const isJd = target === 'jd';
  const info = document.getElementById(isJd ? 'jdFileInfo' : 'fileInfo');
  info.textContent = '📄 ' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)';
  info.classList.add('show');

  const ext = file.name.split('.').pop().toLowerCase();
  const setText = (text) => {
    document.getElementById(isJd ? 'jdText' : 'resumeText').value = text;
    updateCharCount();
  };

  if (ext === 'txt' || ext === 'md') {
    const reader = new FileReader();
    reader.onload = (e) => setText(e.target.result);
    reader.readAsText(file);
  } else if (ext === 'pdf') {
    const reader = new FileReader();
    reader.onload = (e) => {
      const uint8 = new Uint8Array(e.target.result);
      const text = extractPDFText(uint8);
      if (text) setText(text);
      else info.textContent = '⚠️ PDF 内容提取失败，请手动粘贴';
    };
    reader.readAsArrayBuffer(file);
  } else if (ext === 'docx') {
    const reader = new FileReader();
    reader.onload = (e) => {
      const uint8 = new Uint8Array(e.target.result);
      const text = extractDOCXText(uint8);
      if (text) setText(text);
      else info.textContent = '⚠️ DOCX 内容提取失败，请手动粘贴';
    };
    reader.readAsArrayBuffer(file);
  }
}

function extractPDFText(uint8) {
  let text = '';
  const raw = new TextDecoder().decode(uint8);
  const streamRegex = /stream\r?\n([\s\S]*?)endstream/g;
  let m;
  while ((m = streamRegex.exec(raw)) !== null) {
    const block = m[1];
    const textRegex = /\(([^)]*)\)/g;
    let t;
    while ((t = textRegex.exec(block)) !== null) {
      text += t[1].replace(/\\n/g, '\n').replace(/\\\\/g, '\\');
    }
    const hexRegex = /<([0-9A-Fa-f]+)>/g;
    let h;
    while ((h = hexRegex.exec(block)) !== null) text += hexToUtf8(h[1]);
  }
  return text.replace(/\s+/g, ' ').trim();
}

function hexToUtf8(hex) {
  try {
    const bytes = new Uint8Array(hex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
    return new TextDecoder('utf-8').decode(bytes);
  } catch { return ''; }
}

function extractDOCXText(uint8) {
  try {
    const raw = new TextDecoder('latin1').decode(uint8);
    const matches = raw.match(/<w:t[^>]*>([^<]*)<\/w:t>/g);
    if (!matches) return null;
    return matches.map(m => m.replace(/<[^>]+>/g, '')).join('').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').trim();
  } catch { return null; }
}

function updateCharCount() {
  const resumeEl = document.getElementById('resumeText');
  const jdEl = document.getElementById('jdText');
  if (resumeEl) document.getElementById('charCount').textContent = resumeEl.value.length;
  if (jdEl) document.getElementById('jdCharCount').textContent = jdEl.value.length;
}
document.getElementById('resumeText').addEventListener('input', updateCharCount);
document.getElementById('jdText').addEventListener('input', updateCharCount);

// ====== Chat ======
function startInterview() {
  if (!apiKey) { alert('请先配置 API（右上角 ⚙️）'); toggleSettings(); return; }
  if (!modelName) { alert('请先选择模型'); toggleSettings(); return; }
  if (!resumeContent) { showResumeModal(); return; }

  interviewEnded = false;
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('userInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('endBtn').style.display = '';
  setExportButtonState();

  const jdBlock = jdContent || '未提供岗位 JD。请基于候选人简历进行通用技术面试。';
  messages = [
    { role: 'system', content: SYSTEM_PROMPT + '\n\n## 岗位 JD（可选）\n' + jdBlock + '\n\n## 候选人简历\n' + resumeContent },
    { role: 'user', content: '请先基于岗位 JD 和候选人简历判断面试重点，然后直接提出第一个技术问题。', __internal: true }
  ];
  addSystemMsg('🎯 面试开始 — 请认真回答每一个问题');
  getAIResponse();
}

function endInterview() {
  if (interviewEnded || !messages.length) return;
  interviewEnded = true;
  if (isStreaming && abortController) abortController.abort();
  messages.push({ role: 'user', content: REVIEW_PROMPT, __internal: true });
  addMessage('user', '[请求结束面试，生成复盘报告]');
  setExportButtonState(true);
  getAIResponse(true);
  document.getElementById('userInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('endBtn').style.display = 'none';
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isStreaming) return;
  input.value = ''; autoResize(input);
  messages.push({ role: 'user', content: text });
  addMessage('user', text);
  getAIResponse();
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

function getExportableMessages() {
  return messages.filter(({ role, content, __internal }) =>
    !__internal &&
    (role === 'user' || role === 'assistant') &&
    typeof content === 'string' &&
    content.trim() &&
    content !== REVIEW_PROMPT
  );
}

function getExportRoleName(role) {
  return role === 'assistant' ? '面试官' : '候选人';
}

function normalizeExportText(text) {
  return String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
}

function buildInterviewExportMarkdown() {
  const exportMessages = getExportableMessages();
  const lines = [
    '# AI 模拟面试对话记录',
    '',
    '- 导出时间：' + new Date().toLocaleString('zh-CN'),
    '- 使用模型：' + (modelName || '未选择'),
    '- 岗位 JD：' + (jdContent ? '已提供' : '未提供'),
    '',
    '## 对话记录',
    ''
  ];

  exportMessages.forEach((msg, index) => {
    lines.push('### ' + (index + 1) + '. ' + getExportRoleName(msg.role));
    lines.push('');
    lines.push(normalizeExportText(msg.content));
    lines.push('');
  });

  return lines.join('\n');
}

function buildExportFileName() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const stamp = d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + '-' + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
  return 'ai-interview-transcript-' + stamp + '.md';
}

function downloadTextFile(filename, text) {
  const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function exportInterviewTranscript() {
  if (!interviewEnded) { alert('请先结束面试，生成复盘后再导出对话'); return; }
  if (!getExportableMessages().length) { alert('暂无可导出的面试对话'); return; }
  downloadTextFile(buildExportFileName(), buildInterviewExportMarkdown());
}

function setExportButtonState(isBusy = false) {
  const btn = document.getElementById('exportBtn');
  if (!btn) return;
  btn.style.display = interviewEnded ? '' : 'none';
  btn.disabled = isBusy || getExportableMessages().length === 0;
  btn.textContent = isBusy ? '复盘生成中...' : '⬇️ 导出对话';
}

function buildApiMessages() {
  return messages
    .map(({ role, content }) => ({ role, content }))
    .filter(m => m.role && typeof m.content === 'string' && m.content.trim());
}

// ====== Stream API ======
async function getAIResponse(isFinal = false) {
  const responseId = ++responseSeq;
  isStreaming = true; document.getElementById('sendBtn').disabled = true;
  if (isFinal) setExportButtonState(true);
  const msgEl = addMessage('ai', '', true);
  const bubble = msgEl.querySelector('.msg-bubble');
  abortController = new AbortController();

  try {
    // 自动补全 /v1 前缀
    let baseUrl = apiUrl.replace(/\/chat\/completions$/, '').replace(/\/$/, '');
    if (!baseUrl.endsWith('/v1')) {
      baseUrl = baseUrl.replace(/\/$/, '') + '/v1';
    }
    const chatUrl = baseUrl + '/chat/completions';
    const apiMessages = buildApiMessages();
    const maxTokens = isFinal ? 4096 : 2048;
    const res = await fetch(chatUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({ model: modelName, messages: apiMessages, stream: true, max_tokens: maxTokens, temperature: 0.7 }),
      signal: abortController.signal
    });
    if (!res.ok) { const e = await res.text(); throw new Error('API ' + res.status + ': ' + e.slice(0, 150)); }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '', buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n'); buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const delta = JSON.parse(data).choices?.[0]?.delta?.content;
          if (delta) { fullText += delta; bubble.innerHTML = formatMsg(fullText); scrollToBottom(); }
        } catch {}
      }
    }
    messages.push({ role: 'assistant', content: fullText });
  } catch (e) {
    if (e.name === 'AbortError') bubble.innerHTML += '<br><span style="color:var(--warning)">[已中断]</span>';
    else bubble.innerHTML = '<span style="color:var(--danger)">❌ ' + e.message + '</span>';
  } finally {
    if (responseId === responseSeq) {
      isStreaming = false;
      document.getElementById('sendBtn').disabled = interviewEnded;
      if (isFinal || interviewEnded) setExportButtonState(false);
      abortController = null;
    }
  }
}

// ====== Rendering ======
function addMessage(role, text, streaming = false) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div'); div.className = 'message';
  const isAI = role === 'ai';
  div.innerHTML = `
    <div class="msg-avatar ${isAI ? 'ai' : 'user'}">${isAI ? '🤖' : '👤'}</div>
    <div class="msg-content">
      <div class="msg-name">${isAI ? '面试官' : '候选人'}</div>
      <div class="msg-bubble ${isAI ? '' : 'user'}">${streaming ? '<div class="typing"><span></span><span></span><span></span></div>' : formatMsg(text)}</div>
    </div>`;
  area.appendChild(div); scrollToBottom(); return div;
}

function addSystemMsg(text) {
  const div = document.createElement('div'); div.className = 'sys-msg';
  div.innerHTML = `<span>${text}</span>`;
  document.getElementById('chatArea').appendChild(div); scrollToBottom();
}

function formatMsg(t) {
  return t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/\n/g, '<br>');
}

function scrollToBottom() {
  const a = document.getElementById('chatArea');
  requestAnimationFrame(() => a.scrollTop = a.scrollHeight);
}

init();
</script>
