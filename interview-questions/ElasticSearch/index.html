<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElasticSearch - 177道精选面试题</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4f46e5;--primary-light:#818cf8;--primary-bg:#eef2ff;--green:#22c55e;--green-bg:#f0fdf4;--orange:#f59e0b;--orange-bg:#fffbeb;--red:#ef4444;--red-bg:#fef2f2;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);--radius:12px;--radius-sm:8px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--gray-50);color:var(--gray-800);line-height:1.6;min-height:100vh}
.header{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.header-inner{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--gray-900);cursor:pointer}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700}
.logo-text{font-size:20px;font-weight:700;color:var(--gray-900)}.logo-text span{color:var(--primary)}
.header-stats{display:flex;align-items:center;gap:16px;color:var(--gray-500);font-size:14px}.header-stats .count{font-weight:700;color:var(--primary);font-size:18px}
.search-bar{max-width:1200px;margin:0 auto;padding:20px 24px 0}
.search-input-wrap{position:relative;max-width:600px}
.search-input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--gray-400)}
.search-input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:15px;outline:none;transition:all .2s;background:#fff}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.filter-bar{max-width:1200px;margin:0 auto;padding:16px 24px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-tab{padding:6px 16px;border-radius:20px;font-size:14px;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-600);transition:all .2s;user-select:none}
.filter-tab:hover{border-color:var(--primary-light);color:var(--primary)}
.filter-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.main{max-width:1200px;margin:0 auto;padding:20px 24px 60px}
.question-list{display:flex;flex-direction:column;gap:12px}
.question-card{background:#fff;border-radius:var(--radius-sm);padding:20px 24px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;display:flex;align-items:flex-start;gap:16px}
.question-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.question-card .q-num{flex-shrink:0;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;background:var(--primary-bg);color:var(--primary)}
.question-card .q-content{flex:1;min-width:0}
.question-card .q-title{font-size:16px;font-weight:600;color:var(--gray-800);line-height:1.5;margin-bottom:8px}
.question-card .q-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.difficulty-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.difficulty-tag.easy{background:var(--green-bg);color:#16a34a}.difficulty-tag.medium{background:var(--orange-bg);color:#d97706}.difficulty-tag.hard{background:var(--red-bg);color:#dc2626}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}.q-tag{padding:2px 8px;background:var(--gray-100);color:var(--gray-500);border-radius:4px;font-size:12px}
.detail-view{display:none}.detail-view.active{display:block}.list-view.hidden{display:none}
.detail-header{margin-bottom:24px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--gray-500);font-size:14px;cursor:pointer;padding:8px 0;transition:color .2s;background:none;border:none;font-family:inherit}
.back-btn:hover{color:var(--primary)}
.detail-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.detail-question{padding:32px;border-bottom:1px solid var(--gray-100)}
.detail-question .q-title{font-size:22px;font-weight:700;color:var(--gray-900);line-height:1.5;margin-bottom:16px}
.detail-question .q-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.detail-question .q-num-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;background:var(--primary-bg);color:var(--primary);border-radius:6px;font-size:14px;font-weight:600}
.answer-section{padding:0 32px 32px}
.show-answer-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:24px;font-family:inherit}
.show-answer-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.show-answer-btn svg{width:20px;height:20px}
.answer-content{display:none;margin-top:24px;padding:28px;background:var(--gray-50);border-radius:var(--radius-sm);border:1px solid var(--gray-200)}
.answer-content.show{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.answer-content.markdown-body{background:var(--gray-50);font-size:15px;line-height:1.8}
.answer-content.markdown-body h1,.answer-content.markdown-body h2,.answer-content.markdown-body h3{margin-top:20px;margin-bottom:12px;font-weight:700;color:var(--gray-800)}
.answer-content.markdown-body p{margin-bottom:12px}
.answer-content.markdown-body ul,.answer-content.markdown-body ol{padding-left:24px;margin-bottom:12px}
.answer-content.markdown-body code{background:var(--gray-200);padding:2px 6px;border-radius:4px;font-size:14px}
.answer-content.markdown-body pre{background:var(--gray-800);color:#e5e7eb;padding:16px;border-radius:8px;overflow-x:auto;margin-bottom:16px}
.answer-content.markdown-body pre code{background:none;padding:0;color:inherit}
.answer-content.markdown-body strong{color:var(--gray-800)}
.answer-content.markdown-body blockquote{border-left:4px solid var(--primary-light);padding-left:16px;color:var(--gray-600);margin-bottom:12px}
.detail-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:16px}
.nav-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--gray-600);cursor:pointer;transition:all .2s;font-family:inherit;max-width:45%}
.nav-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary);background:var(--primary-bg)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-btn svg{flex-shrink:0;width:16px;height:16px}
.nav-btn .nav-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-center{color:var(--gray-400);font-size:14px;white-space:nowrap}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:24px;flex-wrap:wrap}
.page-btn{padding:8px 14px;border:1.5px solid var(--gray-200);border-radius:8px;background:#fff;color:var(--gray-600);font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit}
.page-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:768px){.header-inner{padding:12px 16px}.logo-text{font-size:17px}.header-stats{display:none}.search-bar,.filter-bar,.main{padding-left:16px;padding-right:16px}.question-card{padding:16px}.question-card .q-num{width:36px;height:36px;font-size:13px}.question-card .q-title{font-size:15px}.detail-question{padding:20px}.answer-section{padding:0 20px 20px}.detail-question .q-title{font-size:18px}.detail-nav{flex-wrap:wrap}.nav-btn{max-width:100%;flex:1}}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400)}.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.5}.empty-state p{font-size:16px}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
<div class="logo" onclick="showList()"><div class="logo-icon">Q</div><div class="logo-text">ElasticSearch<span>面试题</span></div></div>
<div class="header-stats">共 <span class="count" id="totalCount">177</span> 道面试题</div>
</div></div>
<div class="search-bar" id="searchBar"><div class="search-input-wrap">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
<input type="text" class="search-input" id="searchInput" placeholder="搜索面试题..." oninput="filterQuestions()">
</div></div>
<div class="filter-bar" id="filterBar">
<div class="filter-tab active" data-filter="all" onclick="setFilter(this)">全部</div>
<div class="filter-tab" data-filter="简单" onclick="setFilter(this)">🟢 简单</div>
<div class="filter-tab" data-filter="中等" onclick="setFilter(this)">🟡 中等</div>
<div class="filter-tab" data-filter="困难" onclick="setFilter(this)">🔴 困难</div>
</div>
<div class="main">
<div class="list-view" id="listView"><div class="question-list" id="questionList"></div><div class="pagination" id="pagination"></div></div>
<div class="detail-view" id="detailView">
<div class="detail-header"><button class="back-btn" onclick="showList()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>返回题目列表</button></div>
<div class="detail-card">
<div class="detail-question"><div class="q-meta"><span class="q-num-badge" id="detailNum"></span><span class="difficulty-tag" id="detailDiff"></span><div class="q-tags" id="detailTags"></div></div><div class="q-title" id="detailTitle"></div></div>
<div class="answer-section">
<button class="show-answer-btn" id="toggleAnswerBtn" onclick="toggleAnswer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>查看答案</button>
<div class="answer-content markdown-body" id="answerContent"></div>
</div></div>
<div class="detail-nav">
<button class="nav-btn" id="prevBtn" onclick="goQuestion(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg><span class="nav-title" id="prevTitle"></span></button>
<span class="nav-center" id="navCenter"></span>
<button class="nav-btn" id="nextBtn" onclick="goQuestion(1)"><span class="nav-title" id="nextTitle"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
</div></div></div>
<script src="data.js"></script>
<script>
function md(t){if(!t)return'';var h=t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^[\-\*] (.+)$/gm,'<li>$1</li>').replace(/^\d+\. (.+)$/gm,'<li>$1</li>').replace(/^---$/gm,'<hr>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');h=h.replace(/(<li>.*?<\/li>)/gs,function(m){return'<ul>'+m+'</ul>'});h=h.replace(/<\/ul>\s*<ul>/g,'');return'<p>'+h+'</p>'}
var currentFilter='all',currentSearch='',currentPage=1,currentQuestionIdx=-1,PAGE_SIZE=20;
function getFiltered(){return QUESTIONS.filter(function(q){if(currentFilter!=='all'&&q.difficulty!==currentFilter)return false;if(currentSearch){var s=currentSearch.toLowerCase();return q.title.toLowerCase().indexOf(s)!==-1||q.tags.toLowerCase().indexOf(s)!==-1}return true})}
function renderList(){var filtered=getFiltered();var totalPages=Math.ceil(filtered.length/PAGE_SIZE);if(currentPage>totalPages)currentPage=totalPages;if(currentPage<1)currentPage=1;var start=(currentPage-1)*PAGE_SIZE;var pageItems=filtered.slice(start,start+PAGE_SIZE);var list=document.getElementById('questionList');if(filtered.length===0){list.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5-2 4-2 4 2 4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg><p>没有找到匹配的面试题</p></div>';document.getElementById('pagination').innerHTML='';return}list.innerHTML=pageItems.map(function(q){var dc=q.difficulty==='简单'?'easy':q.difficulty==='中等'?'medium':'hard';var tags=q.tags?q.tags.split(',').map(function(t){return'<span class="q-tag">'+t.trim()+'</span>'}).join(''):'';var gi=QUESTIONS.indexOf(q);return'<div class="question-card" onclick="showDetail('+gi+')"><div class="q-num">'+q.num+'</div><div class="q-content"><div class="q-title">'+q.title+'</div><div class="q-meta"><span class="difficulty-tag '+dc+'">'+q.difficulty_emoji+' '+q.difficulty+'</span><div class="q-tags">'+tags+'</div></div></div></div>'}).join('');renderPagination(totalPages);document.getElementById('totalCount').textContent=filtered.length}
function renderPagination(tp){if(tp<=1){document.getElementById('pagination').innerHTML='';return}var h='<button class="page-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage<=1?'disabled':'')+'>上一页</button>';var ms=7,sp=Math.max(1,currentPage-Math.floor(ms/2)),ep=Math.min(tp,sp+ms-1);if(ep-sp<ms-1)sp=Math.max(1,ep-ms+1);if(sp>1)h+='<button class="page-btn" onclick="goPage(1)">1</button>';if(sp>2)h+='<button class="page-btn" disabled>···</button>';for(var i=sp;i<=ep;i++)h+='<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';if(ep<tp-1)h+='<button class="page-btn" disabled>···</button>';if(ep<tp)h+='<button class="page-btn" onclick="goPage('+tp+')">'+tp+'</button>';h+='<button class="page-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage>=tp?'disabled':'')+'>下一页</button>';document.getElementById('pagination').innerHTML=h}
function showDetail(idx){currentQuestionIdx=idx;var q=QUESTIONS[idx];document.getElementById('detailNum').textContent='#'+q.num;document.getElementById('detailTitle').textContent=q.title;var de=document.getElementById('detailDiff');var dc=q.difficulty==='简单'?'easy':q.difficulty==='中等'?'medium':'hard';de.className='difficulty-tag '+dc;de.textContent=q.difficulty_emoji+' '+q.difficulty;document.getElementById('detailTags').innerHTML=q.tags?q.tags.split(',').map(function(t){return'<span class="q-tag">'+t.trim()+'</span>'}).join(''):'';document.getElementById('answerContent').innerHTML=md(q.answer);document.getElementById('answerContent').classList.remove('show');var btn=document.getElementById('toggleAnswerBtn');btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>查看答案';var pq=idx>0?QUESTIONS[idx-1]:null;var nq=idx<QUESTIONS.length-1?QUESTIONS[idx+1]:null;document.getElementById('prevBtn').disabled=!pq;document.getElementById('prevTitle').textContent=pq?pq.title:'';document.getElementById('nextBtn').disabled=!nq;document.getElementById('nextTitle').textContent=nq?nq.title:'';document.getElementById('navCenter').textContent=(idx+1)+' / '+QUESTIONS.length;document.getElementById('listView').classList.add('hidden');document.getElementById('detailView').classList.add('active');document.getElementById('searchBar').style.display='none';document.getElementById('filterBar').style.display='none';window.scrollTo(0,0);history.pushState({idx:idx},'','#q='+q.num)}
function showList(){document.getElementById('listView').classList.remove('hidden');document.getElementById('detailView').classList.remove('active');document.getElementById('searchBar').style.display='';document.getElementById('filterBar').style.display='';history.pushState({},'',window.location.pathname)}
function toggleAnswer(){var c=document.getElementById('answerContent');var b=document.getElementById('toggleAnswerBtn');if(c.classList.contains('show')){c.classList.remove('show');b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>查看答案'}else{c.classList.add('show');b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>隐藏答案'}}
function goQuestion(d){var ni=currentQuestionIdx+d;if(ni>=0&&ni<QUESTIONS.length)showDetail(ni)}
function setFilter(el){document.querySelectorAll('.filter-tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active');currentFilter=el.dataset.filter;currentPage=1;renderList()}
function filterQuestions(){currentSearch=document.getElementById('searchInput').value;currentPage=1;renderList()}
function goPage(p){currentPage=p;renderList();window.scrollTo(0,0)}
document.addEventListener('keydown',function(e){if(!document.getElementById('detailView').classList.contains('active'))return;if(e.key==='ArrowLeft')goQuestion(-1);if(e.key==='ArrowRight')goQuestion(1);if(e.key==='Escape')showList()});
window.addEventListener('popstate',function(e){if(e.state&&e.state.idx!==undefined)showDetail(e.state.idx);else showList()});
function init(){var h=window.location.hash;if(h&&h.indexOf('#q=')===0){var n=parseInt(h.substring(3));var i=-1;for(var j=0;j<QUESTIONS.length;j++){if(QUESTIONS[j].num===n){i=j;break}}if(i>=0){showDetail(i);return}}renderList()}
init();
</script>
</body>
</html>
