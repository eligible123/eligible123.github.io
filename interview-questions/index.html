<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试题库 | 张三的技术博客</title>
<meta name="description" content="2516道Java面试题，涵盖AI大模型、后端、中间件等46个分类">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9FAFB;--card:#FFFFFF;--border:#E5E7EB;
  --text:#111827;--text2:#374151;--text3:#6B7280;--text4:#9CA3AF;
  --accent:#2563EB;--accent-light:#EFF6FF;--accent-hover:#1D4ED8;
  --green:#059669;--green-light:#ECFDF5;--orange:#D97706;--orange-light:#FFFBEB;--red:#DC2626;--red-light:#FEF2F2;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 2px rgba(0,0,0,.05);--shadow-md:0 4px 12px rgba(0,0,0,.08);
  --font:-apple-system,BlinkMacSystemFont,'Inter','PingFang SC','Microsoft YaHei',sans-serif;
  --max:1280px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:15px}
a{color:var(--accent);text-decoration:none}

/* Navbar */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.navbar .inner{max-width:var(--max);margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}.logo span{color:var(--accent)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:var(--text3);font-size:14px;font-weight:500;transition:color .15s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-badge{padding:4px 10px;background:var(--accent-light);color:var(--accent);border-radius:6px;font-size:12px;font-weight:600}

/* Layout */
.page{max-width:var(--max);margin:0 auto;padding:88px 24px 40px}
.hero{margin-bottom:24px}
.hero h1{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:4px}
.hero .sub{font-size:14px;color:var(--text3)}
.main-wrap{display:flex;gap:24px;align-items:flex-start}

/* Sidebar */
.sidebar{width:220px;flex-shrink:0;position:sticky;top:88px;max-height:calc(100vh - 100px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;margin-bottom:1px}
.sidebar-item:hover{background:var(--bg);color:var(--text)}
.sidebar-item.active{background:var(--accent-light);color:var(--accent);font-weight:600}
.sidebar-item .cnt{font-size:11px;color:var(--text4);font-variant-numeric:tabular-nums}
.sidebar-item.active .cnt{color:var(--accent)}

/* Content */
.content{flex:1;min-width:0}

/* Search */
.search-wrap{margin-bottom:16px}
.search-input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--card);transition:all .15s;font-family:inherit}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-wrap{position:relative}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}

/* Question List */
.q-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.q-item{display:flex;gap:12px;padding:12px 16px;background:var(--card);cursor:pointer;transition:background .15s;align-items:flex-start}
.q-item:hover{background:#FAFAFA}
.q-num{width:32px;height:32px;border-radius:var(--radius-sm);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text3);flex-shrink:0}
.q-body{flex:1;min-width:0}
.q-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
.q-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.diff{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.diff.easy{background:var(--green-light);color:var(--green)}.diff.medium{background:var(--orange-light);color:var(--orange)}.diff.hard{background:var(--red-light);color:var(--red)}
.q-tag{padding:2px 6px;background:var(--bg);color:var(--text3);border-radius:4px;font-size:11px}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:4px;margin-top:16px}
.page-btn{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.page-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-info{font-size:12px;color:var(--text4);padding:0 4px}

/* Detail View */
.detail-view{display:none}.detail-view.active{display:block}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-size:13px;cursor:pointer;padding:6px 0;background:none;border:none;font-family:inherit;margin-bottom:16px}
.back-btn:hover{color:var(--accent)}
.detail-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.detail-q{padding:24px;border-bottom:1px solid var(--bg)}
.detail-q .q-title{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:8px}
.answer-section{padding:0 24px 24px}
.show-answer-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;font-family:inherit;transition:all .15s}
.show-answer-btn:hover{background:var(--accent-hover)}
.answer-content{display:none;margin-top:16px;padding:20px;background:var(--bg);border-radius:var(--radius-sm);font-size:14px;line-height:1.8;color:var(--text2);white-space:pre-wrap}
.answer-content.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.detail-nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:12px}
.nav-btn{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}

/* Loading & Empty */
.loading,.empty-state{text-align:center;padding:40px;color:var(--text4);font-size:14px}

/* Footer */
.footer{max-width:var(--max);margin:0 auto;padding:24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;color:var(--text4);font-size:13px}

@media(max-width:768px){
  .main-wrap{flex-direction:column}
  .sidebar{width:100%;position:static;max-height:none;display:flex;gap:4px;flex-wrap:wrap;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .sidebar-item{padding:6px 10px;font-size:12px}
  .nav-links{display:none}
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="inner">
    <a href="/" class="logo">张三<span>.dev</span></a>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/interview-questions/" class="active">题库</a></li>
      <li><a href="/random-question/">刷题</a></li>
      <li><a href="/ai-mock-interview/">AI面试</a></li>
      <li><a href="/archives/">博客</a></li>
    </ul>
    <div class="nav-right"><span class="nav-badge" id="totalCount">—</span></div>
  </div>
</nav>

<div class="page">
  <div class="hero">
    <h1>面试题库</h1>
    <p class="sub" id="heroSub">加载中...</p>
  </div>

  <div class="main-wrap">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content">
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索面试题..." oninput="filterQuestions()">
      </div>
      <div id="listView">
        <div class="q-list" id="questionsList"></div>
        <div class="pagination" id="pagination"></div>
      </div>
      <div class="detail-view" id="detailView">
        <button class="back-btn" onclick="showList()">← 返回列表</button>
        <div class="detail-card">
          <div class="detail-q">
            <div class="q-meta"><span class="diff" id="detailDiff"></span><div id="detailTags"></div></div>
            <h2 class="q-title" id="detailTitle"></h2>
          </div>
          <div class="answer-section">
            <button class="show-answer-btn" onclick="toggleAnswer()">查看答案</button>
            <div class="answer-content" id="answerContent"></div>
          </div>
        </div>
        <div class="detail-nav">
          <button class="nav-btn" id="prevBtn" onclick="navigateQ(-1)">← 上一题</button>
          <span class="page-info" id="qNav">1 / 200</span>
          <button class="nav-btn" id="nextBtn" onclick="navigateQ(1)">下一题 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <span>© 2026 张三的技术博客</span>
  <a href="https://github.com/eligible123">GitHub</a>
</footer>

<script>
const CATEGORIES=[
  {name:'全部题目',dir:'all',count:0},
  {name:'Java',dir:'Java',count:200},
  {name:'Java热门200道',dir:'Java热门200道',count:162},
  {name:'AI大模型',dir:'AI大模型',count:343},
  {name:'Agent面试题',dir:'Agent面试题',count:87},
  {name:'Spring',dir:'Spring',count:58},
  {name:'SpringBoot',dir:'SpringBoot',count:19},
  {name:'SpringCloud',dir:'SpringCloud',count:44},
  {name:'MySQL',dir:'MySQL',count:49},
  {name:'Redis',dir:'Redis',count:24},
  {name:'ElasticSearch',dir:'ElasticSearch',count:177},
  {name:'Kafka',dir:'Kafka',count:59},
  {name:'RabbitMQ',dir:'RabbitMQ',count:35},
  {name:'RocketMQ',dir:'RocketMQ',count:30},
  {name:'Dubbo',dir:'Dubbo',count:64},
  {name:'Zookeeper',dir:'Zookeeper',count:92},
  {name:'Docker',dir:'Docker',count:28},
  {name:'Kubernetes',dir:'Kubernetes',count:25},
  {name:'Nginx',dir:'Nginx',count:115},
  {name:'Linux系统',dir:'Linux系统',count:43},
  {name:'MyBatis',dir:'MyBatis',count:12},
  {name:'Netty',dir:'Netty',count:4},
  {name:'Git基础',dir:'Git基础',count:59},
  {name:'Git进阶',dir:'Git进阶',count:123},
  {name:'SQL电商场景',dir:'SQL电商场景',count:34},
  {name:'SQL网站场景',dir:'SQL网站场景',count:45},
  {name:'后端场景',dir:'后端场景',count:80},
  {name:'后端系统设计',dir:'后端系统设计',count:34},
  {name:'大厂算法真题',dir:'大厂算法真题',count:63},
  {name:'设计模式',dir:'设计模式',count:26},
  {name:'操作系统',dir:'操作系统',count:21},
  {name:'计算机网络',dir:'计算机网络',count:21},
  {name:'消息队列',dir:'消息队列',count:15},
  {name:'华为OD',dir:'华为OD',count:209},
  {name:'字节跳动面经',dir:'字节跳动面经',count:58},
  {name:'阿里巴巴面经',dir:'阿里巴巴面经',count:35},
  {name:'京东面经',dir:'京东面经',count:33},
  {name:'美团面经',dir:'美团面经',count:20},
  {name:'拼多多面经',dir:'拼多多面经',count:19},
  {name:'腾讯面经',dir:'腾讯面经',count:14},
  {name:'快手面经',dir:'快手面经',count:8},
  {name:'百度面经',dir:'百度面经',count:5},
  {name:'小米面经',dir:'小米面经',count:9},
];
CATEGORIES[0].count=CATEGORIES.slice(1).reduce((s,c)=>s+c.count,0);

let curCat='all',curQs=[],filtered=[],curPage=1,curIdx=0,pageSize=30;
let loaded={},loading={},filterTimer=null,allPrefetchPromise=null,allPrefetchScheduled=false,renderSeq=0;

let offset=0;
for(let i=1;i<CATEGORIES.length;i++){
  CATEGORIES[i].start=offset;
  CATEGORIES[i].end=offset+CATEGORIES[i].count;
  offset=CATEGORIES[i].end;
}

function init(){
  renderSidebar();
  document.getElementById('heroSub').textContent=CATEGORIES[0].count+'道面试题 · '+(CATEGORIES.length-1)+'个分类 · 含详细答案';
  document.getElementById('totalCount').textContent=CATEGORIES[0].count+' 道题';
  selectCategory('all');
}

function renderSidebar(){
  document.getElementById('sidebar').innerHTML=CATEGORIES.map(c=>
    `<div class="sidebar-item ${curCat===c.dir?'active':''}" onclick="selectCategory('${c.dir}')"><span>${c.name}</span><span class="cnt">${c.count}</span></div>`
  ).join('');
}

async function selectCategory(dir){
  curCat=dir;curPage=1;renderSidebar();
  if(dir==='all')await loadAll();else await loadCat(dir);
  await applyFilter(false);
  await renderQs();
  show('list');
}

async function loadCat(dir){
  if(loaded[dir]){curQs=loaded[dir];return}
  showLoading();
  curQs=await fetchCategory(dir);
}

async function loadAll(){
  curQs=getAllBuffer();
  await ensureRangeLoaded(0,pageSize);
  startAllPrefetch();
}

function getAllBuffer(){
  if(!loaded.all)loaded.all=new Array(CATEGORIES[0].count);
  return loaded.all;
}

function parseQuestions(text){
  const s=text.indexOf('['),e=text.lastIndexOf(']')+1;
  if(s<0||e<=s)return[];
  return JSON.parse(text.substring(s,e));
}

async function fetchCategory(dir){
  if(loaded[dir])return loaded[dir];
  if(loading[dir])return loading[dir];
  loading[dir]=fetch(`/interview-questions/${encodeURIComponent(dir)}/data.js`)
    .then(r=>r.ok?r.text():Promise.reject(new Error(`HTTP ${r.status}`)))
    .then(t=>{
      const qs=parseQuestions(t);
      loaded[dir]=qs;
      fillAllBuffer(dir,qs);
      return qs;
    })
    .catch(err=>{
      console.warn(`Load interview questions failed: ${dir}`,err);
      loaded[dir]=[];
      return loaded[dir];
    })
    .finally(()=>{delete loading[dir]});
  return loading[dir];
}

function fillAllBuffer(dir,qs){
  if(!loaded.all)return;
  const cat=CATEGORIES.find(c=>c.dir===dir);
  if(!cat||cat.start===undefined)return;
  for(let i=0;i<qs.length&&i<cat.count;i++)loaded.all[cat.start+i]=qs[i];
}

async function ensureRangeLoaded(start,end){
  getAllBuffer();
  const tasks=[];
  for(let i=1;i<CATEGORIES.length;i++){
    const c=CATEGORIES[i];
    if(c.end>start&&c.start<end&&!loaded[c.dir])tasks.push(fetchCategory(c.dir));
  }
  if(tasks.length)await Promise.all(tasks);
}

function hasMissingRange(arr,start,end){
  for(let i=start;i<end;i++)if(!arr[i])return true;
  return false;
}

function startAllPrefetch(){
  if(allPrefetchPromise||allPrefetchScheduled)return;
  allPrefetchScheduled=true;
  const run=()=>loadEveryCategory().then(()=>{
    if(curCat==='all'&&!currentKeyword())renderQs();
  });
  if('requestIdleCallback'in window)requestIdleCallback(run,{timeout:1500});
  else setTimeout(run,300);
}

function loadEveryCategory(){
  if(allPrefetchPromise)return allPrefetchPromise;
  getAllBuffer();
  allPrefetchPromise=(async()=>{
    const cats=CATEGORIES.slice(1);
    let i=0;
    const workerCount=Math.min(6,cats.length);
    await Promise.all(Array.from({length:workerCount},async()=>{
      while(i<cats.length){
        const c=cats[i++];
        await fetchCategory(c.dir);
      }
    }));
    return loaded.all;
  })();
  return allPrefetchPromise;
}

function showLoading(msg='加载中...'){
  document.getElementById('questionsList').innerHTML=`<div class="loading">${msg}</div>`;
  document.getElementById('pagination').innerHTML='';
}
function show(v){document.getElementById('listView').style.display=v==='list'?'block':'none';document.getElementById('detailView').classList.toggle('active',v==='detail')}

async function renderQs(){
  const seq=++renderSeq;
  const total=filtered.length;
  const s=(curPage-1)*pageSize,e=Math.min(s+pageSize,total),tp=Math.ceil(total/pageSize);
  const el=document.getElementById('questionsList');
  if(!total){el.innerHTML='<div class="empty-state">暂无题目</div>';document.getElementById('pagination').innerHTML='';return}
  if(curCat==='all'&&!currentKeyword()&&hasMissingRange(filtered,s,e)){
    showLoading('正在加载当前页...');
    await ensureRangeLoaded(s,e);
    if(seq!==renderSeq)return;
  }
  const pq=filtered.slice(s,e);
  el.innerHTML=pq.map((q,i)=>{
    if(!q)return'<div class="q-item"><div class="q-body"><div class="q-title">当前题目加载失败，请刷新重试</div></div></div>';
    const n=s+i+1,tags=typeof q.tags==='string'?q.tags.split(',').map(t=>t.trim()):(q.tags||[]);
    const dc=difficultyClass(q.difficulty);
    return`<div class="q-item" onclick="showDetail(${s+i})"><div class="q-num">${q.num||n}</div><div class="q-body"><div class="q-title">${q.title}</div><div class="q-meta"><span class="diff ${dc}">${q.difficulty_emoji||''} ${q.difficulty}</span>${tags.slice(0,3).map(t=>`<span class="q-tag">${t}</span>`).join('')}</div></div></div>`;
  }).join('');
  renderPag(tp);
}

function difficultyClass(difficulty){
  return difficulty==='简单'?'easy':difficulty==='中等'?'medium':'hard';
}

function renderPag(tp){
  if(tp<=1){document.getElementById('pagination').innerHTML='';return}
  let h=`<button class="page-btn" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>←</button>`;
  let s=Math.max(1,curPage-3),e=Math.min(tp,s+6);
  if(e-s<6)s=Math.max(1,e-6);
  if(s>1){h+=`<button class="page-btn" onclick="goPage(1)">1</button>`;if(s>2)h+=`<span class="page-info">...</span>`}
  for(let i=s;i<=e;i++)h+=`<button class="page-btn ${i===curPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if(e<tp){if(e<tp-1)h+=`<span class="page-info">...</span>`;h+=`<button class="page-btn" onclick="goPage(${tp})">${tp}</button>`}
  h+=`<button class="page-btn" onclick="goPage(${curPage+1})" ${curPage===tp?'disabled':''}>→</button>`;
  document.getElementById('pagination').innerHTML=h;
}

async function goPage(p){const tp=Math.ceil(filtered.length/pageSize);if(p<1||p>tp)return;curPage=p;await renderQs();window.scrollTo({top:200,behavior:'smooth'})}

function filterQuestions(){
  clearTimeout(filterTimer);
  filterTimer=setTimeout(()=>applyFilter(true),180);
}

function currentKeyword(){
  return document.getElementById('searchInput').value.toLowerCase().trim();
}

function matchQuestion(q,keyword){
  const tags=Array.isArray(q.tags)?q.tags.join(','):(q.tags||'');
  return(q.title||'').toLowerCase().includes(keyword)||tags.toLowerCase().includes(keyword);
}

async function applyFilter(shouldRender){
  const keyword=currentKeyword();
  curPage=1;
  if(curCat==='all'){
    curQs=getAllBuffer();
    if(keyword){
      showLoading('正在加载全部题库用于搜索...');
      await loadEveryCategory();
      filtered=curQs.filter(Boolean).filter(q=>matchQuestion(q,keyword));
    }else{
      filtered=curQs;
    }
  }else{
    if(!loaded[curCat])await loadCat(curCat);
    filtered=keyword?curQs.filter(q=>matchQuestion(q,keyword)):[...curQs];
  }
  if(shouldRender)await renderQs();
}

async function showDetail(i){
  if(curCat==='all'&&!currentKeyword()&&!filtered[i]){
    await ensureRangeLoaded(i,i+1);
  }
  curIdx=i;const item=filtered[i];if(!item)return;
  const tags=typeof item.tags==='string'?item.tags.split(',').map(t=>t.trim()):(item.tags||[]);
  const dc=difficultyClass(item.difficulty);
  document.getElementById('detailTitle').textContent=item.title;
  document.getElementById('detailDiff').textContent=`${item.difficulty_emoji||''} ${item.difficulty}`;
  document.getElementById('detailDiff').className=`diff ${dc}`;
  document.getElementById('detailTags').innerHTML=tags.map(t=>`<span class="q-tag">${t}</span>`).join('');
  document.getElementById('answerContent').textContent=item.answer||'暂无答案';
  document.getElementById('answerContent').classList.remove('show');
  updateNav();show('detail');window.scrollTo({top:0,behavior:'smooth'});
}

function updateNav(){document.getElementById('qNav').textContent=`${curIdx+1} / ${filtered.length}`;document.getElementById('prevBtn').disabled=curIdx===0;document.getElementById('nextBtn').disabled=curIdx===filtered.length-1}
function navigateQ(d){const n=curIdx+d;if(n>=0&&n<filtered.length)showDetail(n)}
function toggleAnswer(){document.getElementById('answerContent').classList.toggle('show')}
function showList(){show('list')}

init();
</script>
</body>
</html>
