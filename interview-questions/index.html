<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试题库 | 李阳的技术博客</title>
<meta name="description" content="2516道Java面试题，涵盖AI大模型、后端、中间件等46个分类">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #111827;
  --secondary: #374151;
  --bg: #F9FAFB;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --text: #111827;
  --subtext: #6B7280;
  --success: #10B981;
  --warning: #F59E0B;
  --danger: #EF4444;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Navigation */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.navbar .container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--subtext);
  font-size: 14px;
  font-weight: 500;
}

.nav-links a:hover { color: var(--primary); }

/* Hero */
.hero {
  padding: 100px 24px 40px;
  max-width: 1200px;
  margin: 0 auto;
}

.hero h1 {
  font-size: 36px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -1px;
  margin-bottom: 8px;
}

.hero .subtitle {
  font-size: 16px;
  color: var(--subtext);
}

/* Main Layout */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 80px;
  display: flex;
  gap: 32px;
}

/* Sidebar */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  position: sticky;
  top: 88px;
  height: fit-content;
}

.sidebar-nav {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--secondary);
  transition: all 0.15s;
}

.sidebar-item:hover {
  background: var(--bg);
  color: var(--primary);
}

.sidebar-item.active {
  background: var(--primary);
  color: white;
}

.sidebar-item .count {
  font-size: 12px;
  color: var(--subtext);
}

.sidebar-item.active .count {
  color: rgba(255,255,255,0.7);
}

/* Content */
.content {
  flex: 1;
  min-width: 0;
}

/* Search */
.search-bar {
  margin-bottom: 20px;
}

.search-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus {
  border-color: var(--primary);
}

/* Questions List */
.questions-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.question-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 16px;
}

.question-item:hover {
  border-color: #D1D5DB;
  box-shadow: var(--shadow);
}

.question-num {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--subtext);
  flex-shrink: 0;
}

.question-content {
  flex: 1;
  min-width: 0;
}

.question-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.question-meta {
  display: flex;
  gap: 8px;
  align-items: center;
}

.difficulty {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
}

.difficulty.easy {
  background: #ECFDF5;
  color: #059669;
}

.difficulty.medium {
  background: #FEF3C7;
  color: #D97706;
}

.difficulty.hard {
  background: #FEF2F2;
  color: #DC2626;
}

.question-tags {
  display: flex;
  gap: 4px;
}

.question-tag {
  padding: 2px 8px;
  background: var(--bg);
  border-radius: 4px;
  font-size: 12px;
  color: var(--subtext);
}

/* Detail View */
.detail-view {
  display: none;
}

.detail-view.active {
  display: block;
}

.detail-header {
  margin-bottom: 24px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--subtext);
  font-size: 14px;
  cursor: pointer;
  padding: 8px 0;
  background: none;
  border: none;
  font-family: inherit;
}

.back-btn:hover {
  color: var(--primary);
}

.detail-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.detail-question {
  padding: 32px;
  border-bottom: 1px solid var(--border);
}

.detail-question .q-title {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 12px;
}

.detail-question .q-meta {
  display: flex;
  gap: 12px;
  align-items: center;
}

.answer-section {
  padding: 32px;
}

.show-answer-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}

.show-answer-btn:hover {
  background: #1F2937;
}

.answer-content {
  display: none;
  margin-top: 24px;
  padding: 24px;
  background: var(--bg);
  border-radius: var(--radius);
  font-size: 15px;
  line-height: 1.8;
  color: var(--secondary);
}

.answer-content.show {
  display: block;
}

.answer-content p {
  margin-bottom: 12px;
}

.answer-content strong {
  color: var(--primary);
}

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-top: 24px;
}

.page-btn {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--secondary);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}

.page-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.page-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  padding: 32px 24px;
  text-align: center;
  color: var(--subtext);
  font-size: 13px;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .hero h1 { font-size: 28px; }
  .question-item { flex-direction: column; align-items: flex-start; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">LY.DEV</a>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/interview-questions/">题库</a></li>
      <li><a href="/ai-mock-interview/">AI面试</a></li>
      <li><a href="/random-question/">随机一题</a></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <h1>面试题库</h1>
  <p class="subtitle">2516道面试题 · 46个分类 · 含详细答案</p>
</section>

<div class="main">
  <aside class="sidebar">
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
  </aside>

  <div class="content">
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索面试题...">
    </div>

    <div class="questions-list" id="questionsList"></div>
    <div class="pagination" id="pagination"></div>

    <div class="detail-view" id="detailView">
      <div class="detail-header">
        <button class="back-btn" onclick="showList()">← 返回列表</button>
      </div>
      <div class="detail-card">
        <div class="detail-question">
          <div class="q-meta">
            <span class="difficulty" id="detailDiff"></span>
            <div class="question-tags" id="detailTags"></div>
          </div>
          <h2 class="q-title" id="detailTitle"></h2>
        </div>
        <div class="answer-section">
          <button class="show-answer-btn" onclick="toggleAnswer()">查看答案</button>
          <div class="answer-content" id="answerContent"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 李阳的技术博客</p>
</footer>

<script>
// Question categories with counts
const categories = [
  { name: '全部题目', count: 2516, filter: 'all' },
  { name: 'Java', count: 200, filter: 'java' },
  { name: 'Spring', count: 58, filter: 'spring' },
  { name: 'MySQL', count: 49, filter: 'mysql' },
  { name: 'Redis', count: 24, filter: 'redis' },
  { name: 'Kafka', count: 59, filter: 'kafka' },
  { name: 'JVM', count: 50, filter: 'jvm' },
  { name: 'AI大模型', count: 343, filter: 'ai' },
  { name: '系统设计', count: 34, filter: 'system' },
  { name: '算法', count: 63, filter: 'algo' },
  { name: 'Docker', count: 28, filter: 'docker' },
  { name: 'Kubernetes', count: 25, filter: 'k8s' },
];

// Sample questions
const questions = [
  { id: 1, title: '请说说Java中HashMap的底层实现原理？', difficulty: '中等', tags: ['HashMap', '集合', 'JDK'], category: 'java', answer: 'HashMap基于数组+链表+红黑树实现。JDK8后，当链表长度超过8且数组长度>=64时，链表转为红黑树。默认初始容量16，负载因子0.75，扩容为原来的2倍。' },
  { id: 2, title: 'volatile关键字的作用是什么？', difficulty: '中等', tags: ['volatile', '多线程', '并发'], category: 'java', answer: 'volatile保证可见性和禁止指令重排序，但不能保证原子性。适用于状态标记、DCL单例等场景。' },
  { id: 3, title: 'MySQL的事务隔离级别有哪些？', difficulty: '中等', tags: ['MySQL', '事务', '隔离级别'], category: 'mysql', answer: '读未提交、读已提交、可重复读（MySQL默认）、串行化。分别解决脏读、不可重复读、幻读问题。' },
  { id: 4, title: 'Redis的持久化机制有哪些？', difficulty: '中等', tags: ['Redis', '持久化', 'RDB'], category: 'redis', answer: 'RDB定时快照、AOF记录命令、混合持久化。RDB文件小恢复快，AOF数据安全，混合结合两者优点。' },
  { id: 5, title: 'JVM的垃圾回收机制是什么？', difficulty: '困难', tags: ['JVM', 'GC', '垃圾回收'], category: 'jvm', answer: '通过可达性分析判断对象存活，使用标记-清除、标记-整理、复制算法。新生代用复制，老年代用标记-整理。' },
  { id: 6, title: 'Spring Boot自动配置原理？', difficulty: '中等', tags: ['Spring', '自动配置', 'Starter'], category: 'spring', answer: '@EnableAutoConfiguration加载spring.factories，通过条件注解过滤配置类。' },
  { id: 7, title: '如何设计一个秒杀系统？', difficulty: '困难', tags: ['秒杀', '高并发', '系统设计'], category: 'system', answer: '前端限流、Redis预扣库存、异步下单、乐观锁防超卖。' },
  { id: 8, title: 'Transformer的Self-Attention机制？', difficulty: '困难', tags: ['Transformer', 'Attention', 'AI'], category: 'ai', answer: 'Q、K、V线性变换，计算注意力分数softmax(QK^T/√d)V，多头注意力并行计算。' },
  { id: 9, title: 'MySQL索引的B+树原理？', difficulty: '中等', tags: ['索引', 'B+树', 'MySQL'], category: 'mysql', answer: '多路平衡搜索树，非叶子节点只存索引，叶子节点存数据用链表连接，树高3-4层减少IO。' },
  { id: 10, title: '分布式事务解决方案？', difficulty: '困难', tags: ['分布式', '事务', 'TCC'], category: 'system', answer: '2PC、3PC、TCC、本地消息表、MQ事务消息、Seata等方案。' },
];

let currentCategory = 'all';
let currentPage = 1;
const pageSize = 20;

// Initialize
function init() {
  renderSidebar();
  renderQuestions();
}

// Render sidebar
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = categories.map(cat => `
    <div class="sidebar-item ${currentCategory === cat.filter ? 'active' : ''}" onclick="selectCategory('${cat.filter}')">
      <span>${cat.name}</span>
      <span class="count">${cat.count}</span>
    </div>
  `).join('');
}

// Select category
function selectCategory(filter) {
  currentCategory = filter;
  currentPage = 1;
  renderSidebar();
  renderQuestions();
  showList();
}

// Render questions
function renderQuestions() {
  const list = document.getElementById('questionsList');
  const filtered = currentCategory === 'all' ? questions : questions.filter(q => q.category === currentCategory);

  list.innerHTML = filtered.map((q, i) => `
    <div class="question-item" onclick="showDetail(${q.id})">
      <div class="question-num">${i + 1}</div>
      <div class="question-content">
        <div class="question-title">${q.title}</div>
        <div class="question-meta">
          <span class="difficulty ${q.difficulty === '简单' ? 'easy' : q.difficulty === '中等' ? 'medium' : 'hard'}">${q.difficulty}</span>
          <div class="question-tags">
            ${q.tags.map(t => `<span class="question-tag">${t}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// Show detail
function showDetail(id) {
  const q = questions.find(q => q.id === id);
  if (!q) return;

  document.getElementById('questionsList').style.display = 'none';
  document.querySelector('.pagination').style.display = 'none';
  document.getElementById('detailView').classList.add('active');

  document.getElementById('detailTitle').textContent = q.title;
  document.getElementById('detailDiff').textContent = q.difficulty;
  document.getElementById('detailDiff').className = `difficulty ${q.difficulty === '简单' ? 'easy' : q.difficulty === '中等' ? 'medium' : 'hard'}`;
  document.getElementById('detailTags').innerHTML = q.tags.map(t => `<span class="question-tag">${t}</span>`).join('');
  document.getElementById('answerContent').innerHTML = `<p>${q.answer}</p>`;
  document.getElementById('answerContent').classList.remove('show');
}

// Show list
function showList() {
  document.getElementById('questionsList').style.display = 'flex';
  document.querySelector('.pagination').style.display = 'flex';
  document.getElementById('detailView').classList.remove('active');
}

// Toggle answer
function toggleAnswer() {
  document.getElementById('answerContent').classList.toggle('show');
}

// Search
document.getElementById('searchInput').addEventListener('input', function(e) {
  const query = e.target.value.toLowerCase();
  const items = document.querySelectorAll('.question-item');
  items.forEach(item => {
    const title = item.querySelector('.question-title').textContent.toLowerCase();
    item.style.display = title.includes(query) ? '' : 'none';
  });
});

init();
</script>

</body>
</html>
